<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Holosphere — POV LED Sphere Simulator</title>
    <link href="./styles/index.css" rel="stylesheet" />
    <script src="./vendor-importmap.js"></script>
</head>

<body>
    <div class="page">
        <div id="layout-container" class="layout-container">
            <div class="nav-tabs">
                <span class="nav-label">Tools:</span>
                <a href="tools/lissajous.html" target="_blank" class="tab">Lissajous</a>
                <a href="tools/mobius.html" target="_blank" class="tab">Mobius</a>
                <a href="tools/palettes.html" target="_blank" class="tab">Palettes</a>
                <a href="tools/solids.html" target="_blank" class="tab">Solids</a>
                <div id="global-stats-desktop">
                    <table class="global-stats global-stats--desktop">
                        <tr class="stats-head">
                            <th>Scratch A KB</th>
                            <th>Scratch B KB</th>
                            <th>Persistent KB</th>
                            <th>Stack KB</th>
                            <th>Compute</th>
                        </tr>
                        <tr>
                            <td id="stat-scratch-a"></td>
                            <td id="stat-scratch-b"></td>
                            <td id="stat-persistent"></td>
                            <td id="stat-stack"></td>
                            <td id="perf-stats"></td>
                        </tr>
                    </table>
                </div>
            </div>
            <div class="main-area">
                <div id="effect-sidebar" class="effect-sidebar"></div>
                <div id="stats-bar" class="stats-bar">
                    <table class="global-stats global-stats--mobile">
                        <tr class="stats-head">
                            <th>Scratch A</th>
                            <th>Scratch B</th>
                            <th>Persistent</th>
                            <th>Stack</th>
                            <th>Compute</th>
                        </tr>
                        <tr>
                            <td id="stat-scratch-a-m"></td>
                            <td id="stat-scratch-b-m"></td>
                            <td id="stat-persistent-m"></td>
                            <td id="stat-stack-m"></td>
                            <td id="perf-stats-mobile"></td>
                        </tr>
                    </table>
                </div>
                <div id="canvas-container" class="canvas-container">
                    <div id="loading-overlay" class="loading-overlay">
                        <div class="spinner"></div>
                        <span>Loading engine...</span>
                    </div>
                    <div id="segment-stats" class="segment-stats" style="display:none;"></div>
                    <canvas id="canvas" role="img" aria-label="Real-time 3D simulation of the LED sphere"></canvas>
                </div>
            </div>
            <div id="gui-container" class="gui-container"></div>
        </div>
    </div>
    <script type="module" src="daydream.js"></script>
</body>

</html>
