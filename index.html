<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="google" value="notranslate">
    <link href="./styles/index.css" rel="stylesheet" />
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/renderers/webgpu/WebGPURenderer.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.21.0/dist/lil-gui.esm.min.js",
            "gui": "./gui.js"
          }
        }
    </script>
</head>

<body>
    <div class="page">
        <div id="layout-container" class="layout-container">
            <div class="nav-tabs">
                <span class="nav-label">Tools:</span>
                <a href="tools/lissajous.html" target="_blank" class="tab">Lissajous</a>
                <a href="tools/mobius.html" target="_blank" class="tab">Mobius</a>
                <a href="tools/palettes.html" target="_blank" class="tab">Palettes</a>
                <a href="tools/solids.html" target="_blank" class="tab">Solids</a>
                <a href="tools/splines.html" target="_blank" class="tab">Splines</a>
                <span id="arena-stats"
                    style="color: grey; margin-left: 10px; font-family: monospace; font-size: 12px;">
                    <table style="text-align:center; border-collapse: collapse; line-height: 1.2; display:inline-table;">
                        <tr style="color: #999;">
                            <th style="font-weight:normal; border-right: 1px solid #444; padding: 0 4px;">Scratch A</th>
                            <th style="font-weight:normal; border-right: 1px solid #444; padding: 0 4px;">Scratch B</th>
                            <th style="font-weight:normal; padding: 0 4px;">Persistent</th>
                        </tr>
                        <tr style="white-space: nowrap;">
                            <td id="stat-scratch-a" style="border-right: 1px solid #444; padding: 0 8px;"></td>
                            <td id="stat-scratch-b" style="border-right: 1px solid #444; padding: 0 8px;"></td>
                            <td id="stat-persistent" style="padding: 0 8px;"></td>
                        </tr>
                    </table>
                </span>
                <span id="perf-stats"
                    style="color: grey; margin-left: 10px; font-family: monospace; font-size: 12px;"></span>
            </div>
            <div class="main-area">
                <div id="effect-sidebar" class="effect-sidebar"></div>
                <div id="stats-bar" class="stats-bar">
                    <span id="arena-stats-mobile"
                        style="color: grey; font-family: monospace; font-size: 10px;">
                        <table style="text-align:center; border-collapse: collapse; line-height: 1.2; display:inline-table;">
                            <tr style="color: #999;">
                                <th style="font-weight:normal; border-right: 1px solid #444; padding: 0 4px;">Scratch A</th>
                                <th style="font-weight:normal; border-right: 1px solid #444; padding: 0 4px;">Scratch B</th>
                                <th style="font-weight:normal; padding: 0 4px;">Persistent</th>
                            </tr>
                            <tr style="white-space: nowrap;">
                                <td id="stat-scratch-a-m" style="border-right: 1px solid #444; padding: 0 4px;"></td>
                                <td id="stat-scratch-b-m" style="border-right: 1px solid #444; padding: 0 4px;"></td>
                                <td id="stat-persistent-m" style="padding: 0 4px;"></td>
                            </tr>
                        </table>
                    </span>
                    <span id="perf-stats-mobile"
                        style="color: grey; font-family: monospace; font-size: 10px;"></span>
                </div>
                <div id="canvas-container" class="canvas-container">
                    <div id="loading-overlay" class="loading-overlay">
                        <div class="spinner"></div>
                        <span>Loading engine...</span>
                    </div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
            <div id="gui-container" class="gui-container"></div>
        </div>
    </div>
    <script type="module" src="daydream.js" defer></script>
</body>

</html>
