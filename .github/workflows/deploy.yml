# Deploy the daydream simulator to GitHub Pages (Pages source: GitHub Actions),
# GATED on the Holosphere engine's native unit suite and the simulator's JS unit
# suite. The `deploy` job `needs: [gate, js-tests]`, so the live site only updates
# when both suites pass.
#
# The committed app files are published as-is (three.js / lil-gui load from the
# CDN via vendor-importmap.js, so they don't need vendoring here). The engine's
# WASM module is whatever is committed in this repo — built and installed from
# Holosphere; the gate verifies that engine's suite is green.
#
# The gate pins its engine checkout to the SHA the committed .wasm was built
# from (holosphere_wasm.sha, written next to the module by the Holosphere WASM
# install step), so it tests the exact source the deployed module corresponds to
# rather than a decoupled engine HEAD. It also asserts the committed .wasm is
# byte-identical to the hash recorded at build time (holosphere_wasm.wasm.sha256),
# binding the deployed artifact to that recorded hash. Finally it asserts the
# three provenance files (.wasm, .wasm.sha256, .sha) share a last-touch commit —
# they are written atomically by the install, so a lone-file commit means the
# engine source-pin has decoupled from the binary; this binds the source-pin to
# the exact artifact. All three are committed alongside the module; if any is
# missing, the .wasm doesn't match its recorded hash, or they were not committed
# together, the gate fails hard rather than deploying an unverifiable artifact
# (a silent fallback to engine HEAD would make the gate inert).
#
# If the engine repo (woundedlion/pov) is PRIVATE, add a repository secret
# POV_TOKEN = a PAT with read access. For a public engine repo the default
# workflow token is sufficient.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  gate:
    name: Engine unit tests (deploy gate)
    runs-on: ubuntu-24.04   # pinned image: deterministic apt clang version
    steps:
      - name: Checkout daydream (for the pinned engine SHA)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: the provenance-atomicity check reads git log per file

      - name: Verify committed WASM matches its recorded build hash
        run: |
          if [ ! -f holosphere_wasm.wasm.sha256 ]; then
            echo "::error::holosphere_wasm.wasm.sha256 not found — the deployed artifact is unverifiable. The Holosphere WASM install writes it next to the module; commit it with the .wasm."
            exit 1
          fi
          sha256sum -c holosphere_wasm.wasm.sha256

      - name: Verify the provenance trio was committed atomically
        # The Holosphere WASM install writes .wasm, .wasm.sha256, and .sha in one
        # build event, so they must be committed together. The sha256 check above
        # only binds .wasm↔.wasm.sha256 (internal consistency); it cannot catch a
        # .sha advanced to a different engine commit while the binary is stale.
        # Asserting all three share a last-touch commit binds the engine source-pin
        # to the exact artifact, closing the .sha↔.wasm decoupling gap. (A source
        # change that yields a byte-identical .wasm must still be re-committed as the
        # full trio — rebuild and stage all three rather than the lone .sha.)
        run: |
          wasm_c="$(git log -1 --format=%H -- holosphere_wasm.wasm)"
          sha_c="$(git log -1 --format=%H -- holosphere_wasm.sha)"
          s256_c="$(git log -1 --format=%H -- holosphere_wasm.wasm.sha256)"
          echo "last-touch commits: .wasm=$wasm_c .sha=$sha_c .wasm.sha256=$s256_c"
          if [ -z "$wasm_c" ] || [ "$wasm_c" != "$sha_c" ] || [ "$wasm_c" != "$s256_c" ]; then
            echo "::error::WASM provenance files were not committed atomically — the engine source-pin (.sha) is decoupled from the binary (.wasm) and/or its hash (.wasm.sha256). Re-run the Holosphere WASM install and commit all three together."
            exit 1
          fi

      - name: Resolve engine SHA the committed WASM was built from
        id: engine
        run: |
          if [ ! -f holosphere_wasm.sha ]; then
            echo "::error::holosphere_wasm.sha not found — engine provenance is unrecorded, so the gate can't pin to the source the committed WASM was built from. The Holosphere WASM install writes it next to the module; commit it with the .wasm."
            exit 1
          fi
          sha="$(tr -d '[:space:]' < holosphere_wasm.sha)"
          echo "Pinning engine checkout to $sha (from holosphere_wasm.sha)"
          echo "ref=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout engine (woundedlion/pov) at the pinned SHA
        uses: actions/checkout@v4
        with:
          repository: woundedlion/pov
          ref: ${{ steps.engine.outputs.ref }}
          token: ${{ secrets.POV_TOKEN || github.token }}
          path: engine

      - name: Install Clang + Ninja
        # Pin the compiler version (clang-18 = Ubuntu 24.04 default) to match CI
        # so the deploy gate runs the engine suite on the same known compiler.
        run: sudo apt-get update && sudo apt-get install -y clang-18 ninja-build

      - run: >
          cmake --preset tests -DHS_INSTALL_GIT_HOOKS=OFF
          -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18
        working-directory: engine
      - run: cmake --build --preset tests
        working-directory: engine
      - run: ctest --preset tests --output-on-failure
        working-directory: engine

  js-tests:
    name: Simulator JS unit tests (deploy gate)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'      # package.json engines: node >=22.3.0
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - name: Verify committed import map
        run: |
          npm run importmap
          git diff --exit-code
      - run: npm test

  deploy:
    name: Deploy to Pages
    needs: [gate, js-tests]       # ← only deploys if both suites pass
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage site (explicit allowlist)
        # Publish only the runtime app, not the whole repo tree. The former
        # path: '.' shipped .git/, tests/, scripts/, and dev tooling to Pages
        # (node_modules/, three.js/, vendor/ are gitignored, so absent from this
        # fresh checkout — but the tracked dev files were not). Copy the served
        # set: index.html, README + its screenshot gallery, the root ES modules,
        # styles/, tools/, and the WASM binary. three.js / lil-gui / Tailwind
        # load from their CDNs (vendor-importmap.js + the tools' onerror
        # fallback), so no vendored dirs are needed.
        run: |
          mkdir _site
          cp index.html README.md *.js holosphere_wasm.wasm _site/
          cp -r styles tools docs _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
