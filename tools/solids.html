<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solids Generator</title>
  <!-- Vendored Tailwind (Play CDN build) for offline dev. /vendor/ is
       gitignored, so on the Pages deploy this file 404s; the onerror falls back
       to the Play CDN — the same in-browser build — instead of serving the tool
       unstyled. -->
  <script src="../vendor/tailwindcss.js"
    onerror="this.remove();document.head.appendChild(Object.assign(document.createElement('script'),{src:'https://cdn.tailwindcss.com'}))"></script>
  <script src="../vendor-importmap.js"></script>
  <link rel="stylesheet" href="tools.css">
  <style>
    :root {
      --sidebar-width: 224px;
      /* Grows with viewport width but never collapses (or inverts) below the
         474px reference width; capped so it doesn't crowd the canvas. */
      --footer-height: clamp(96px, (100vw - 474px) * 0.22, 220px);
      --right-sidebar-width: 250px;
    }

    body {
      overflow: hidden;
      margin: 0;
      display: flex;
    }

    #sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      height: 100vh;
      background-color: rgba(15, 23, 42, 0.95);
      border-right: 1px solid var(--slate-700);
      display: flex;
      flex-direction: column;
      z-index: 20;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #main {
      flex: 1;
      min-width: 0;
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
      min-height: 0;
      /* Allow shrinking */
      overflow: hidden;
    }

    #footer {
      width: 100%;
      height: var(--footer-height);
      background-color: transparent;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(max(64px, (100vw - 474px) * 0.08), 1fr));
      grid-auto-rows: calc((var(--footer-height) - 1.5rem) / 2);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.5rem;
      gap: 0.5rem;
      z-index: 10;
    }

    /* Scrollbar styling for footer */
    #footer::-webkit-scrollbar {
      height: 8px;
    }

    #footer::-webkit-scrollbar-track {
      background: var(--slate-900);
    }

    #footer::-webkit-scrollbar-thumb {
      background: var(--slate-700);
      border-radius: 4px;
    }

    #footer::-webkit-scrollbar-thumb:hover {
      background: var(--slate-600);
    }

    .thumb-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--slate-800);
      border: 2px solid var(--slate-700);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      padding: max(4px, (100vw - 474px) * 0.005);
      position: relative;
    }

    .thumb-btn:hover {
      border-color: var(--blue-500);
      background-color: var(--slate-700);
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    .thumb-btn.active {
      border-color: var(--blue-500);
      background-color: rgba(59, 130, 246, 0.15);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .thumb-btn img {
      height: 60%;
      object-fit: contain;
      margin-bottom: max(2px, (100vw - 474px) * 0.004);
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }

    .thumb-btn span {
      font-size: clamp(0.55rem, (100vw - 474px) * 0.008, 0.85rem);
      text-align: center;
      line-height: 1.1;
      color: #cbd5e1;
    }

    #code-panel {
      position: absolute;
      bottom: var(--footer-height);
      /* Sit above footer */
      left: 0;
      right: 0;
      height: 200px;
      background-color: var(--slate-800);
      border-top: 1px solid var(--slate-700);
      padding: 1rem;
      transform: translateY(150%);
      /* Hide fully */
      transition: transform 0.3s ease;
      z-index: 30;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    #code-panel.open {
      transform: translateY(0);
    }

    textarea {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--slate-900);
      color: #a5b4fc;
      border: 1px solid var(--slate-700);
      resize: none;
      font-size: 0.8rem;
    }

    /* .btn / .btn-primary / .btn-secondary now live in tools.css (shared).
       The add-op grid packs 14 buttons into the sidebar, so it overrides the
       shared padding with a tighter vertical profile. */
    #addOpGrid .btn {
      padding: 0.2rem 0.3rem;
    }

    /* Ops the validator proved would trap an engine invariant on the current
       mesh (see chainIsValid). */
    #addOpGrid .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .op-item {
      background-color: var(--slate-800);
      border: 1px solid var(--slate-700);
      padding: 0.25rem 0.4rem;
      border-radius: 0.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
      position: relative;
      transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), border-color 0.2s, opacity 0.2s;
      user-select: none;
    }

    .op-item:hover {
      border-color: var(--indigo-400);
    }

    .op-item.dragging {
      opacity: 0.2;
      transform: scale(0.98);
      border-style: dashed;
      z-index: 10;
    }

    .drag-handle {
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      height: 1.25rem;
      margin-right: 0.25rem;
      color: var(--slate-500);
      flex-shrink: 0;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .op-item:hover .drag-handle {
      opacity: 1;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .drag-handle svg {
      width: 0.8rem;
      height: 0.8rem;
      fill: currentColor;
    }

    #saveBtn {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background-color: rgba(15, 23, 42, 0.8);
      border: 2px solid var(--slate-700);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }

    #save-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 40;
    }

    #meshStats {
      background-color: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--slate-700);
      border-radius: 0.5rem;
      padding: 0.4rem 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: rgba(165, 180, 252, 0.8);
      text-transform: uppercase;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      pointer-events: none;
      white-space: nowrap;
    }

    #saveBtn:hover {
      border-color: var(--blue-500);
      transform: scale(1.1);
    }

    #saveBtn svg {
      width: 1.5rem;
      height: 1.5rem;
      stroke: #fbbf24;
      fill: none;
      stroke-width: 2;
    }

    #right-sidebar {
      width: var(--right-sidebar-width);
      flex-shrink: 0;
      height: 100vh;
      background-color: rgba(15, 23, 42, 0.95);
      border-left: 1px solid var(--slate-700);
      display: flex;
      flex-direction: column;
      z-index: 20;
      overflow-y: auto;
      padding: 1rem;
    }

    .saved-item {
      background-color: var(--slate-800);
      border: 1px solid var(--slate-700);
      border-radius: 0.5rem;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .saved-item:hover {
      border-color: var(--blue-500);
      transform: translateY(-2px);
    }

    .saved-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 0.25rem;
      margin-bottom: 0.5rem;
      background-color: #000;
    }

    .saved-item .title {
      font-size: 0.8rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 0.1rem;
    }

    .saved-item .details {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    .saved-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    .action-btn {
      font-size: 0.65rem;
      padding: 0.2rem 0.4rem;
      border-radius: 0.2rem;
      background-color: var(--slate-700);
      color: #cbd5e1;
      border: 1px solid var(--slate-600);
      transition: all 0.2s;
      font-weight: 600;
    }

    .action-btn:hover {
      background-color: var(--blue-500);
      color: white;
      border-color: var(--blue-400);
    }

    .del-btn:hover {
      background-color: #ef4444;
      border-color: #f87171;
    }

    /* Small screens: the three side-by-side columns don't fit, so stack them
       (canvas, then controls, then saved solids) and let the page scroll. */
    @media (max-width: 640px) {
      body {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }

      #main {
        order: 1;
        height: 60vh;
      }

      #sidebar {
        order: 2;
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--slate-700);
      }

      #right-sidebar {
        order: 3;
        width: 100%;
        height: auto;
        border-left: none;
        border-top: 1px solid var(--slate-700);
      }
    }
  </style>
</head>

<body>

  <div id="sidebar" class="p-4 space-y-6">
    <div>
      <h1 class="text-xl font-bold text-white mb-1">Solids Generator</h1>
      <p class="text-xs text-indigo-300">Conway Mesh Operators</p>
    </div>

    <!-- Operations Queue. The source solid renders as the pinned first card of
         the stack (not a draggable op row — it lives outside #opsList so the
         drag/drop index math stays 1:1 with state.ops). -->
    <div class="space-y-2 flex-1 overflow-hidden flex flex-col">
      <div class="flex-1 min-h-[140px] overflow-y-auto pr-2">
        <div class="flex items-center space-x-2 bg-slate-800 border border-slate-700 rounded px-1.5 py-1 mb-1">
          <img id="baseThumb" src=""
            class="w-8 h-8 object-contain bg-slate-900 rounded border border-slate-700 flex-shrink-0" />
          <div id="baseTitle" class="text-[0.65rem] font-black text-white uppercase tracking-wider line-clamp-2 min-w-0">
          </div>
        </div>
        <div id="opsList" class="relative space-y-1">
          <!-- Operations go here -->
        </div>
      </div>

      <div class="flex items-center justify-between">
        <label class="text-xs uppercase font-semibold text-slate-400">Add Operation</label>
        <button id="clearOpsBtn"
          class="text-[0.65rem] text-red-400 hover:text-red-300 uppercase font-bold tracking-wider">Clear
          All</button>
      </div>
      <!-- Gate feedback: why the last op/reorder/base change was rejected. -->
      <div id="opGateMsg" class="text-[0.6rem] text-amber-400 h-3 leading-3"></div>
      <!-- Add-operation buttons carry the op name in data-op; a single delegated
           click listener (wired in init) dispatches to addOp, so no handler is
           pinned to window. -->
      <div id="addOpGrid" class="grid grid-cols-3 gap-1 pt-1">
        <button data-op="kis" class="btn btn-secondary text-[0.65rem]">Kis</button>
        <button data-op="ambo" class="btn btn-secondary text-[0.65rem]">Ambo</button>
        <button data-op="gyro" class="btn btn-secondary text-[0.65rem]">Gyro</button>
        <button data-op="snub" class="btn btn-secondary text-[0.65rem]">Snub</button>
        <button data-op="dual" class="btn btn-secondary text-[0.65rem]">Dual</button>
        <button data-op="truncate" class="btn btn-secondary text-[0.65rem]">Truncate</button>
        <button data-op="chamfer" class="btn btn-secondary text-[0.65rem]">Chamfer</button>
        <button data-op="expand" class="btn btn-secondary text-[0.65rem]">Expand</button>
        <button data-op="hankin" class="btn btn-secondary text-[0.65rem]">Hankin</button>
        <button data-op="relax" class="btn btn-secondary text-[0.65rem]">Relax</button>
        <button data-op="meta" class="btn btn-secondary text-[0.65rem] relative group">
          Meta
          <span
            class="absolute hidden group-hover:block bottom-full mb-1 left-1/2 -translate-x-1/2 bg-black text-white text-[0.5rem] p-1 rounded whitespace-nowrap z-50">
            Kis(Ambo(x))
          </span>
        </button>
        <button data-op="needle" class="btn btn-secondary text-[0.65rem] relative group">
          Needle
          <span
            class="absolute hidden group-hover:block bottom-full mb-1 left-1/2 -translate-x-1/2 bg-black text-white text-[0.5rem] p-1 rounded whitespace-nowrap z-50">
            Kis(Dual(x))
          </span>
        </button>
        <button data-op="zip" class="btn btn-secondary text-[0.65rem] relative group">
          Zip
          <span
            class="absolute hidden group-hover:block bottom-full mb-1 left-1/2 -translate-x-1/2 bg-black text-white text-[0.5rem] p-1 rounded whitespace-nowrap z-50">
            Dual(Kis(x))
          </span>
        </button>
        <button data-op="bevel" class="btn btn-secondary text-[0.65rem] relative group">
          Bevel
          <span
            class="absolute hidden group-hover:block bottom-full mb-1 left-1/2 -translate-x-1/2 bg-black text-white text-[0.5rem] p-1 rounded whitespace-nowrap z-50">
            Truncate(Ambo(x), t)
          </span>
        </button>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="canvas-container">
      <!-- Index Labels Overlay -->
      <div id="labels" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
      <div id="save-actions">
        <div class="flex flex-col items-end gap-1">
          <div id="meshStats"></div>
          <div id="arenaStats"
            class="hidden md:block font-mono text-[0.6rem] text-slate-500 bg-slate-900/80 px-2 py-0.5 rounded border border-slate-700 whitespace-nowrap">
          </div>
        </div>
        <button id="saveBtn" title="Save to Collection">
          <!-- Star Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
            </polygon>
          </svg>
        </button>
      </div>
      <canvas id="canvas" class="w-full h-full block"></canvas>
    </div>

    <div id="footer">
      <!-- Dynamic Thumbnails -->
    </div>
  </div>

  <div id="right-sidebar">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-white">Saved Solids</h2>
      <button id="clearSavedBtn"
        class="text-xs text-red-400 hover:text-red-300 uppercase font-bold tracking-wider">Clear All</button>
    </div>
    <div id="savedList" class="flex-1 overflow-y-auto">
      <!-- Saved items go here -->
    </div>

    <!-- Visualization Options (kept out of the left sidebar so the op stack
         retains its vertical space on short viewports) -->
    <div class="space-y-2 border-t border-slate-700 pt-4 mt-4 flex-shrink-0">
      <label class="text-xs uppercase font-semibold text-slate-400">Visualization</label>

      <div class="flex items-center justify-between">
        <span class="text-sm">Geodesic Edges</span>
        <button id="toggleGeo" class="toggle-switch is-on" role="switch" aria-checked="true" aria-label="Geodesic Edges"><div class="toggle-knob"></div></button>
      </div>

      <div class="flex items-center justify-between">
        <span class="text-sm">Show Faces</span>
        <button id="toggleFaces" class="toggle-switch is-on" role="switch" aria-checked="true" aria-label="Show Faces"><div class="toggle-knob"></div></button>
      </div>

      <div class="flex items-center justify-between">
        <span class="text-sm">Colorize Faces</span>
        <button id="toggleColorize" class="toggle-switch" role="switch" aria-checked="false" aria-label="Colorize Faces"><div class="toggle-knob"></div></button>
      </div>

      <div class="flex items-center justify-between">
        <span class="text-sm">Show Vertices</span>
        <button id="toggleVerts" class="toggle-switch" role="switch" aria-checked="false" aria-label="Show Vertices"><div class="toggle-knob"></div></button>
      </div>

      <div class="flex items-center justify-between">
        <span class="text-sm">Show Normals</span>
        <button id="toggleNormals" class="toggle-switch" role="switch" aria-checked="false" aria-label="Show Normals"><div class="toggle-knob"></div></button>
      </div>

      <div class="flex items-center justify-between">
        <span class="text-sm">Show Indices</span>
        <button id="toggleIndices" class="toggle-switch" role="switch" aria-checked="false" aria-label="Show Indices"><div class="toggle-knob"></div></button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { initScene, copyWithFeedback, showFatalError } from './shared.js';
    // Pure C++ export-string codegen (formatFloat/pctSuffix/recipe builders) and
    // the internal-angle geometry helper live in solid_codegen.js so they can be
    // unit tested without a DOM or the WASM module. DOM/WASM wiring stays inline.
    import { formatFloat, pctSuffix, generateFuncAndRecipe, generateRecipeCpp, computeInternalAngle } from './solid_codegen.js';
    import createHolosphereModule from '../holosphere_wasm.js';

    let camera, scene, renderer, controls;
    let mainMesh, edgeLines, vertPoints, normalLines;
    let labelsContainer;
    let draggingIndex = -1;

    // Render materials are configuration-only and identical across updates, so
    // build them once and reuse. update() rebuilds geometry every call (it
    // depends on the mesh) but must not churn — or leak — a fresh material per
    // recompute, which previously happened on every op-slider tick.
    const faceMaterial = new THREE.MeshPhongMaterial({
      color: 0x3b82f6,
      transparent: true,
      opacity: 0.9,
      side: THREE.DoubleSide,
      flatShading: true,
      shininess: 50,
      polygonOffset: true,
      polygonOffsetFactor: 1,
      polygonOffsetUnits: 1
    });
    // Same config as faceMaterial, but sourcing color from the per-vertex
    // topology-class attribute generated when Colorize Faces is on.
    const faceColorizeMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      side: THREE.DoubleSide,
      flatShading: true,
      shininess: 50,
      polygonOffset: true,
      polygonOffsetFactor: 1,
      polygonOffsetUnits: 1
    });
    const vertMaterial = new THREE.PointsMaterial({ color: 0xa5b4fc, size: 0.05 });
    const edgeMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
    const normalMaterial = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });

    // Coalesce update() calls into one recompute per animation frame. Op-slider
    // oninput fires on every pointer tick during a drag; without this each tick
    // replays the entire WASM op chain (relax alone is up to 500 iterations) on
    // the main thread. scheduleUpdate keeps at most one recompute pending.
    let pendingUpdate = 0;
    function scheduleUpdate() {
      if (pendingUpdate) return;
      pendingUpdate = requestAnimationFrame(() => {
        pendingUpdate = 0;
        update();
      });
    }

    // Extract the unique undirected edges of a polygon-face mesh as [lo, hi]
    // vertex-index pairs. Shared by renderMesh() and generateThumbnails(), which
    // previously duplicated this block verbatim. Keys are numeric (lo*N + hi)
    // rather than `${a}_${b}` template strings, so no per-half-edge string is
    // allocated.
    function uniqueEdges(faces, vertexCount) {
      const seen = new Set();
      const edges = [];
      for (const f of faces) {
        for (let i = 0; i < f.length; i++) {
          const a = f[i];
          const b = f[(i + 1) % f.length];
          const lo = a < b ? a : b;
          const hi = a < b ? b : a;
          const key = lo * vertexCount + hi;
          if (!seen.has(key)) { seen.add(key); edges.push([lo, hi]); }
        }
      }
      return edges;
    }

    // WASM Module
    let WasmModule = null;
    let MeshOpsWasm = null;

    // --- STATE ---
    const state = {
      base: 'cube',
      ops: [], // Array of objects { op: string, params: object }
      showGeodesics: true,
      showFaces: true,
      colorizeFaces: false,
      showVertices: false,
      showNormals: false,
      showIndices: false
    };

    const baseThumbnails = {};

    // The most recently built mesh (JS-side copy), read by the stats panel,
    // index labels, and the internal-angle helper. Module-scoped — every reader
    // lives in this script (the window.* handlers below close over it), so it
    // needs no global.
    let currentMesh = null;
    // Per-face topology class ids for the Colorize Faces toggle, cached from the
    // last recompute. classifyFaces() needs the live WASM mesh, which update()
    // frees, so we compute it once per recompute and reuse it when renderMesh()
    // redraws after a presentation-only toggle.
    let currentFaceClasses = null;

    // Lists (populated from WASM)
    let PlatonicSolids = [];
    let ArchimedeanSolids = [];
    let IslamicStarPatterns = [];

    // Catalan solids live in `namespace Catalan` in solids.h, which sees
    // Archimedean/Platonic via using-directives but is NOT itself visible from
    // them. The WASM registry only reports Simple/Complex, so — like the
    // hardcoded Platonic list below — we keep the known Catalan base names here
    // to qualify a generated registry entry with the right namespace. Emitting
    // `Archimedean::<catalan base>...` would not compile.
    const CATALAN_BASES = new Set([
      'triakisTetrahedron', 'rhombicDodecahedron', 'triakisOctahedron',
      'tetrakisHexahedron', 'deltoidalIcositetrahedron', 'disdyakisDodecahedron',
      'pentagonalIcositetrahedron', 'rhombicTriacontahedron', 'triakisIcosahedron',
      'pentakisDodecahedron', 'deltoidalHexecontahedron', 'disdyakisTriacontahedron',
      'pentagonalHexecontahedron',
    ]);

    const OP_DEFS = {
      kis: { params: {} },
      ambo: { params: {} },
      gyro: { params: {} },
      snub: { params: { t: { val: 0.5, min: 0.01, max: 0.99, step: 0.01 }, twist: { val: 0.0, min: 0, max: 1.0, step: 0.01 } } },
      dual: { params: {} },
      truncate: { params: { t: { val: 0.33, min: 0.01, max: 0.5, step: 0.01 } } },
      chamfer: { params: { t: { val: 0.5, min: 0.01, max: 1.0, step: 0.01 } } },
      expand: { params: { t: { val: 0.5, min: 0.01, max: 0.99, step: 0.01 } } },
      hankin: { params: { angle: { val: 54, min: 0, max: 90, step: 1 } } },
      relax: { params: { iter: { val: 100, min: 1, max: 500, step: 1 } } },
      meta: { params: {} },
      needle: { params: {} },
      zip: { params: {} },
      bevel: { params: { t: { val: 0.25, min: 0.01, max: 0.5, step: 0.01 } } }
    };

    // Initialize
    async function init() {
      // Load WASM
      try {
        WasmModule = await createHolosphereModule();
        MeshOpsWasm = WasmModule.MeshOps;
        console.log('WASM Module Loaded');

        // Populate Registry from WASM
        const registry = MeshOpsWasm.getRegistry();
        // registry is array of {name, category}
        // Filter into existing categories
        PlatonicSolids = [];
        ArchimedeanSolids = [];
        IslamicStarPatterns = [];

        // Hardcoded knowledge of Platonic for ordering if desired, or just push
        const platonics = ['tetrahedron', 'cube', 'octahedron', 'dodecahedron', 'icosahedron'];

        for (let i = 0; i < registry.length; i++) {
          const item = registry[i];
          const name = item.name;
          const cat = item.category; // "Simple" or "Complex"

          if (cat === "Complex") {
            IslamicStarPatterns.push(name);
          } else {
            // Simple: Platonic or Archimedean
            if (platonics.includes(name)) {
              PlatonicSolids.push(name);
            } else {
              ArchimedeanSolids.push(name);
            }
          }
        }

      } catch (e) {
        console.error('Failed to load WASM:', e);
        showFatalError('Failed to load the Holosphere WASM engine — the solids '
          + 'tool needs the built holosphere_wasm artifacts. Build the WASM '
          + 'target and reload.');
        return;
      }

      // Start Memory Metrics Loop. Keep the timer handle so the self-
      // rescheduling loop can be cancelled — previously it ran forever with no
      // way to stop it.
      let arenaMetricsTimer = null;
      function updateArenaMetrics() {
        if (MeshOpsWasm) {
          const m = MeshOpsWasm.getArenaMetrics();
          const fmt = (x) => `${(x.high_water_mark / 1024).toFixed(0)} / ${(x.capacity / 1024).toFixed(0)}KB`;
          const statsEl = document.getElementById('arenaStats');
          if (statsEl) {
            statsEl.innerText = `${fmt(m.tooling_arena)}`;
          }
        }
        arenaMetricsTimer = setTimeout(updateArenaMetrics, 500); // 2fps update is enough
      }
      window.addEventListener('pagehide', () => {
        if (arenaMetricsTimer !== null) { clearTimeout(arenaMetricsTimer); arenaMetricsTimer = null; }
      }, { once: true });
      updateArenaMetrics();

      // Initialize Three.js. The shared scaffold supplies the renderer / camera /
      // OrbitControls / resize / animation loop; the solids-specific bits (auto-
      // rotate, transparent buffer, light rig, free-zoom range, and the per-frame
      // index-label projection) are passed as options. Resize uses the scaffold's
      // default (canvas-container clientWidth) — a window-relative override
      // subtracting both sidebar widths went negative once the ≤640px layout
      // stacks the sidebars at width:100%.
      const result = initScene('canvas-container', 'canvas', {
        cameraPosition: [2, 1.5, 2],
        far: 100,
        minDistance: 0,
        maxDistance: Infinity,
        alpha: true,
        autoRotate: true,
        autoRotateSpeed: 2.0,
        lights: true,
        showSphere: false,
        onAfterRender: updateLabels,
      });
      scene = result.scene;
      camera = result.camera;
      renderer = result.renderer;
      controls = result.controls;

      // Wire the scaffold's dispose() to teardown — it stops the render loop and
      // detaches the resize listener, which previously leaked on page unload.
      window.addEventListener('pagehide', () => result.dispose(), { once: true });

      // Toggles
      // These toggles change only how the cached mesh is presented, so they
      // redraw via renderMesh() instead of update() — no WASM op-chain replay.
      document.getElementById('toggleGeo').parentElement.addEventListener('click', () => {
        state.showGeodesics = !state.showGeodesics;
        updateToggles();
        renderMesh();
      });
      document.getElementById('toggleFaces').parentElement.addEventListener('click', () => {
        state.showFaces = !state.showFaces;
        updateToggles();
        renderMesh();
      });
      document.getElementById('toggleColorize').parentElement.addEventListener('click', () => {
        state.colorizeFaces = !state.colorizeFaces;
        updateToggles();
        renderMesh();
      });
      document.getElementById('toggleVerts').parentElement.addEventListener('click', () => {
        state.showVertices = !state.showVertices;
        updateToggles();
        renderMesh();
      });
      document.getElementById('toggleNormals').parentElement.addEventListener('click', () => {
        state.showNormals = !state.showNormals;
        updateToggles();
        renderMesh();
      });
      document.getElementById('toggleIndices').parentElement.addEventListener('click', () => {
        state.showIndices = !state.showIndices;
        updateToggles();
        renderMesh();
      });

      // A click on the animation pauses/unpauses the auto-rotation. Track the
      // pointer-down position so orbit drags (and multi-touch gestures, via
      // isPrimary) don't toggle it.
      const canvasEl = document.getElementById('canvas');
      let pointerDownX = 0, pointerDownY = 0;
      canvasEl.addEventListener('pointerdown', (e) => {
        if (!e.isPrimary) return;
        pointerDownX = e.clientX;
        pointerDownY = e.clientY;
      });
      canvasEl.addEventListener('pointerup', (e) => {
        if (!e.isPrimary) return;
        if (Math.hypot(e.clientX - pointerDownX, e.clientY - pointerDownY) < 5) {
          controls.autoRotate = !controls.autoRotate;
        }
      });

      labelsContainer = document.getElementById('labels');

      document.getElementById('saveBtn').addEventListener('click', saveSolid);

      // Static control buttons — wired here rather than via inline onclick so
      // their handlers stay module-scoped (no window.* globals). The add-op grid
      // uses one delegated listener that reads the clicked button's data-op
      // (closest() so a click on a tooltip span still resolves the button).
      document.getElementById('clearOpsBtn').addEventListener('click', resetOps);
      document.getElementById('clearSavedBtn').addEventListener('click', clearSavedSolids);
      document.getElementById('addOpGrid').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-op]');
        if (btn) addOp(btn.dataset.op);
      });

      // Generate Thumbnails
      generateThumbnails();

      updateToggles();
      result.resize(); // re-fit the canvas after the sidebars' content settled
      update();
      renderBaseSolid();
    }

    function wasmMeshToJs(wasmMesh) {
      const vArray = wasmMesh.getVertices(); // Float32Array

      // NaN Check
      for (let i = 0; i < vArray.length; i++) {
        if (Number.isNaN(vArray[i])) {
          console.error("WASM returned NaN vertex at index", i);
          return { vertices: [], faces: [] }; // Fail gracefully
        }
      }

      const vertices = [];
      for (let i = 0; i < vArray.length; i += 3) {
        vertices.push(new THREE.Vector3(vArray[i], vArray[i + 1], vArray[i + 2]));
      }

      const flat = wasmMesh.getFaces(); // { indices: Uint16Array, counts: Uint8Array }
      const faces = [];
      let k = 0;
      for (let i = 0; i < flat.counts.length; i++) {
        const n = flat.counts[i];
        const face = new Array(n);
        for (let c = 0; c < n; c++) face[c] = flat.indices[k++];
        faces.push(face);
      }

      return { vertices, faces };
    }

    async function generateThumbnails() {
      const footer = document.getElementById('footer');

      // Gather all solid names from exported lists
      const thumbKeys = [...PlatonicSolids, ...ArchimedeanSolids, ...IslamicStarPatterns];

      // Create offscreen renderer
      const width = 256; // High-res for larger thumbs
      const height = 256;
      const offRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      offRenderer.setSize(width, height);
      offRenderer.setClearColor(0x000000, 0); // Transparent

      const offScene = new THREE.Scene();
      const offCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
      offCamera.position.set(1.5, 1.5, 1.5);
      offCamera.lookAt(0, 0, 0);

      const light = new THREE.DirectionalLight(0xffffff, 1.5);
      light.position.set(2, 5, 3);
      offScene.add(light);
      offScene.add(new THREE.AmbientLight(0xffffff, 0.5));

      // Material for thumbnails
      const mat = new THREE.MeshPhongMaterial({
        color: 0x3b82f6,
        flatShading: true,
        shininess: 30
      });
      const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });

      for (const key of thumbKeys) {
        // Yield to the event loop before each solid. Each iteration is a full
        // WASM build + triangulation + WebGL render + toDataURL — heavy enough
        // that running the whole list synchronously froze first paint and input
        // during init(). Deferring each to its own macrotask lets the page paint
        // and stay responsive while the footer fills in progressively; this is
        // why generateThumbnails() is async and init() deliberately does not
        // await it.
        await new Promise(resolve => setTimeout(resolve));

        // Reset to just the lights; the previous iteration's mesh/lines are
        // detached here and their GPU buffers freed at the end of the loop body.
        offScene.clear();
        offScene.add(light);
        offScene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const wasmMesh = MeshOpsWasm.fromSolidName(key);
        const meshData = wasmMeshToJs(wasmMesh);
        wasmMesh.delete();
        MeshOpsWasm.clearToolingMemory();

        // Triangulate
        const vertices = [];
        meshData.faces.forEach(f => {
          for (let i = 1; i < f.length - 1; i++) {
            vertices.push(...meshData.vertices[f[0]].toArray());
            vertices.push(...meshData.vertices[f[i]].toArray());
            vertices.push(...meshData.vertices[f[i + 1]].toArray());
          }
        });
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geo.computeVertexNormals();

        const mesh = new THREE.Mesh(geo, mat);
        offScene.add(mesh);

        // Edges (optional, but looks nice)
        const linePoints = [];
        for (const [ai, bi] of uniqueEdges(meshData.faces, meshData.vertices.length)) {
          linePoints.push(meshData.vertices[ai], meshData.vertices[bi]);
        }
        const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
        const lines = new THREE.LineSegments(lineGeo, lineMat);
        offScene.add(lines);

        // Render
        offRenderer.render(offScene, offCamera);

        // Create Button
        const btn = document.createElement('div');
        btn.className = `thumb-btn ${state.base === key ? 'active' : ''}`;
        btn.dataset.solid = key; // identify the base so restoreSolid can re-highlight it
        btn.onclick = () => {
          queueCommit(async () => {
            // The op stack is kept across a base switch, so it must be valid
            // on the new solid too.
            if (state.ops.length && !(await chainIsValid(key, state.ops))) {
              showGateMsg('rejected: op stack would exceed an engine mesh limit on this solid');
              return;
            }
            state.base = key;
            update();
            renderBaseSolid();
            // Update active state
            document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        };

        const img = document.createElement('img');
        const dataURL = offRenderer.domElement.toDataURL();
        img.src = dataURL;
        baseThumbnails[key] = dataURL;

        // init() now renders the base preview before this (deferred) loop has
        // produced its thumbnail, so refresh it the moment its own thumb exists
        // rather than leaving the preview blank until the next selection.
        if (key === state.base) {
          document.getElementById('baseThumb').src = dataURL;
        }

        const span = document.createElement('span');
        // Format Name: truncatedIcosahedron -> Truncated Icosahedron -> Truncated\nIcosahedron?
        // Split camel case
        const title = key.replace(/([A-Z])/g, ' $1').trim();
        const parts = title.split(' ');
        span.innerHTML = parts.join('<br>');

        btn.appendChild(img);
        btn.appendChild(span);
        footer.appendChild(btn);

        // Free the per-iteration geometry GPU buffers; the thumbnail image is
        // already captured into dataURL above.
        geo.dispose();
        lineGeo.dispose();
      }

      // Cleanup
      mat.dispose();
      lineMat.dispose();
      offRenderer.dispose();
    }

    function updateToggles() {
      // Each toggle's on/off look is driven by the shared `.toggle-switch.is-on`
      // CSS (tools.css), so syncing state is just toggling that one class.
      const toggleState = {
        toggleGeo: state.showGeodesics,
        toggleFaces: state.showFaces,
        toggleColorize: state.colorizeFaces,
        toggleVerts: state.showVertices,
        toggleNormals: state.showNormals,
        toggleIndices: state.showIndices,
      };
      for (const [id, on] of Object.entries(toggleState)) {
        const btn = document.getElementById(id);
        if (!btn) continue;
        btn.classList.toggle('is-on', !!on);
        btn.setAttribute('aria-checked', on ? 'true' : 'false'); // role="switch" state
      }
    }

    // --- SAVED ITEMS ---
    const savedSolids = [];

    function saveSolid() {
      // Nothing to save until the first successful update() has produced a mesh
      // (clicking save before then would dereference an undefined currentMesh).
      if (!currentMesh) return;

      // Capture thumbnail
      renderer.render(scene, camera);
      const dataURL = renderer.domElement.toDataURL('image/png');

      const title = state.base.replace(/([A-Z])/g, ' $1').trim();

      // Get current counts from currentMesh. Derive the edge count directly from
      // the faces (not currentMesh.edgeCount, which is only set on a successful
      // renderMesh pass — after a failed op chain it would be stale/0).
      const vCount = currentMesh.vertices.length;
      const fCount = currentMesh.faces.length;
      const eCount = uniqueEdges(currentMesh.faces, vCount).length;
      let iCount = 0;
      currentMesh.faces.forEach(f => iCount += f.length);

      // Generate summary
      const opsSummary = state.ops.map(o => {
        if (o.op === 'truncate') return `Tr(${o.params.t})`;
        if (o.op === 'hankin') return `Hk(${o.params.angle.toFixed(2)})`;
        return o.op.charAt(0).toUpperCase() + o.op.slice(1);
      }).join(', ') || 'Base Solid';

      const item = {
        id: Date.now(),
        base: state.base,
        ops: structuredClone(state.ops), // Deep copy (ops are plain data)
        geodesics: state.showGeodesics,
        faces: state.showFaces,
        colorize: state.colorizeFaces,
        vertices: state.showVertices,
        normals: state.showNormals,
        indices: state.showIndices,
        thumb: dataURL,
        title: title,
        desc: opsSummary,
        stats: `${vCount}V ${eCount}E ${fCount}F ${iCount}I`,
        vCount, fCount, iCount
      };

      // Warn on a funcName collision rather than letting it overwrite silently:
      // generateFuncAndRecipe encodes op params at coarse granularity (pctSuffix
      // to 0.01, hankin to 1 deg), so two near-identical solids can share a
      // funcName and the later C++ paste would clobber the earlier definition.
      try {
        const { funcName } = generateFuncAndRecipe(item);
        const clash = savedSolids.some(s => generateFuncAndRecipe(s).funcName === funcName);
        if (clash) {
          console.warn(`Saved solid generates funcName "${funcName}", which collides with an `
            + `existing saved solid — their exported C++ would overwrite each other. `
            + `Vary an op parameter by at least the suffix granularity to keep names unique.`);
        }
      } catch (e) {
        // generateFuncAndRecipe only throws on an invalid base/op, which the
        // registry-backed state should never produce; ignore so a save still works.
      }

      savedSolids.push(item);
      renderSavedList();
    }

    function renderSavedList() {
      const list = document.getElementById('savedList');
      list.innerHTML = '';

      savedSolids.forEach((item, index) => {
        const el = document.createElement('div');
        el.className = 'saved-item relative pr-6'; // Added relative + right padding space
        // The card markup carries no inline handlers; the action buttons are
        // wired below via addEventListener so deleteSolid/copyCode stay module-
        // scoped (no window.* globals) and no handler-bearing string is parsed.
        el.innerHTML = `
          <button class="action-btn del-btn absolute top-2 right-2 flex items-center justify-center w-5 h-5 text-sm">&times;</button>
          <img src="${item.thumb}" alt="${item.title}" />
          <div class="flex justify-between items-start mt-1">
            <div class="title capitalize">${item.title}</div>
            <div class="text-[0.55rem] font-mono text-indigo-400 opacity-60">${item.stats}</div>
          </div>
          <div class="details uppercase opacity-70">${item.desc}</div>
          <div class="saved-actions">
            <div class="flex flex-col gap-1 w-full">
              <div class="flex gap-1 justify-end">
                <span class="text-[0.5rem] uppercase text-slate-500 font-bold self-center mr-1">Recipe</span>
                <button class="action-btn" data-copy="recipe_cpp">C++</button>
              </div>
              <div class="flex gap-1 justify-end">
                <span class="text-[0.5rem] uppercase text-slate-500 font-bold self-center mr-1">Registry</span>
                <button class="action-btn" data-copy="registry">C++</button>
              </div>
            </div>
          </div>
        `;
        el.onclick = () => restoreSolid(item);

        // stopPropagation on the action controls so they don't also trigger the
        // card's restore click (previously inline `event.stopPropagation()`).
        el.querySelector('.del-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteSolid(index);
        });
        el.querySelector('.saved-actions').addEventListener('click', (e) => e.stopPropagation());
        el.querySelectorAll('[data-copy]').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            copyCode(index, btn.dataset.copy, btn);
          });
        });

        list.insertBefore(el, list.firstChild); // Newest first
      });
    }

    // These handlers are module-scoped and bound via addEventListener where the
    // generated markup needs them (saved-solids cards and op-chain rows), so no
    // function is pinned to window. Keep new handlers wired the same way.
    function deleteSolid(index) {
      savedSolids.splice(index, 1);
      renderSavedList();
    }

    function copyCode(index, lang, btn) {
      const item = savedSolids[index];

      let code = '';

      if (lang === 'recipe_cpp') {
        code = generateRecipeCpp(item);
      } else if (lang === 'registry') {
        const { funcName } = generateFuncAndRecipe(item);

        const isComplex = IslamicStarPatterns.includes(item.base);
        // Catalan bases must qualify with `Catalan::` — `Archimedean::` cannot
        // resolve a name defined in `namespace Catalan`. Archimedean and
        // Platonic bases both resolve under `Archimedean::` (it `using`s
        // Platonic), so they share that qualifier.
        const nsName = isComplex
          ? "IslamicStarPatterns"
          : (CATALAN_BASES.has(item.base) ? "Catalan" : "Archimedean");
        const catName = isComplex ? "Complex" : "Simple";

        code = `    {"${funcName}",\n     ${nsName}::${funcName},\n     Category::${catName}},`;
      } else {
        console.warn("Unsupported export type.");
        return;
      }

      copyWithFeedback(code, { element: btn, copiedClasses: ['text-green-400'] })
        .then(() => console.log(`${lang.toUpperCase()} copied!`));
    }

    function restoreSolid(item) {
      queueCommit(async () => {
        // Saved items were valid when saved, but the engine may have been
        // rebuilt with different limits since; validate on the way back in.
        if (!(await chainIsValid(item.base, item.ops))) {
          showGateMsg(GATE_REASON);
          return;
        }
        applyRestore(item);
      });
    }

    function applyRestore(item) {
      state.base = item.base;
      state.ops = structuredClone(item.ops); // Deep copy (ops are plain data)
      state.showGeodesics = item.geodesics;
      state.showFaces = item.faces !== undefined ? item.faces : true;
      state.colorizeFaces = !!item.colorize;
      state.showVertices = item.vertices;
      state.showNormals = !!item.normals;
      state.showIndices = !!item.indices;

      // Update UI
      updateToggles();
      renderOps();

      // Highlight active base in footer
      document.querySelectorAll('.thumb-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.solid === state.base);
      });

      update();
      renderBaseSolid();
    }

    function renderBaseSolid() {
      const thumb = baseThumbnails[state.base];
      const title = state.base.replace(/([A-Z])/g, ' $1').trim();
      document.getElementById('baseThumb').src = thumb || '';
      document.getElementById('baseTitle').innerText = title;
    }

    function enableDrag(e) {
      const item = e.target.closest('.op-item');
      if (item) item.draggable = true;
    }

    function movedOps(ops, from, to) {
      const next = structuredClone(ops);
      const [m] = next.splice(from, 1);
      next.splice(to, 0, m);
      return next;
    }

    // Which raw drop slots (getDragTargetIndex values) yield an engine-valid
    // chain for the op being dragged. Filled asynchronously from dragstart;
    // slots still pending stay droppable — the drop re-validates
    // authoritatively before committing.
    let validDropSlots = new Map();
    let dropSlotGen = 0;
    async function precomputeDropSlots(fromIndex) {
      const gen = ++dropSlotGen;
      validDropSlots = new Map();
      for (let t = 0; t <= state.ops.length; t++) {
        const to = t > fromIndex ? t - 1 : t;
        if (to === fromIndex) { validDropSlots.set(t, true); continue; }
        const ok = await chainIsValid(state.base, movedOps(state.ops, fromIndex, to));
        if (gen !== dropSlotGen) return;
        validDropSlots.set(t, ok);
      }
    }

    // Helper: Calculate insertion index based on static layout (ignoring transforms)
    function getDragTargetIndex(e, list) {
      const items = [...list.children];
      // Calculate mouse Y relative to the scrolling list container
      const listRect = list.getBoundingClientRect();
      const mouseY = e.clientY - listRect.top + list.scrollTop;

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        // mid point of the item in the list's coordinate space
        // offsetTop is correct because container is relative
        const mid = item.offsetTop + (item.offsetHeight / 2);
        if (mouseY < mid) {
          return i;
        }
      }
      return items.length;
    }

    function renderOps() {
      const list = document.getElementById('opsList');
      // Clean up overrides if any
      list.innerHTML = '';

      // Container-level Drag Events
      list.ondragover = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        if (draggingIndex === -1) return;

        const targetIndex = getDragTargetIndex(e, list);
        const items = [...list.children];
        const draggingItem = items[draggingIndex];

        if (!draggingItem) return;

        // An engine-invalid slot gets no insertion preview and no drop cursor.
        if (validDropSlots.get(targetIndex) === false) {
          e.dataTransfer.dropEffect = 'none';
          items.forEach((item, idx) => {
            if (idx !== draggingIndex) item.style.transform = '';
          });
          return;
        }

        // Amount to visual shift: height of item + gap (space-y-1 is 0.25rem = 4px)
        const shiftAmount = draggingItem.offsetHeight + 4;

        items.forEach((item, idx) => {
          if (idx === draggingIndex) return;

          item.style.transform = '';

          // Transformation Logic
          if (draggingIndex < targetIndex) {
            // Dragging Down: items between draggingIndex and targetIndex shift UP
            if (idx > draggingIndex && idx < targetIndex) {
              item.style.transform = `translateY(-${shiftAmount}px)`;
            }
          } else {
            // Dragging Up: items between targetIndex and draggingIndex shift DOWN
            if (idx >= targetIndex && idx < draggingIndex) {
              item.style.transform = `translateY(${shiftAmount}px)`;
            }
          }
        });
      };

      list.ondrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const fromIndex = draggingIndex;
        if (fromIndex === -1) return;

        const rawTarget = getDragTargetIndex(e, list);
        // Adjust index: removing the item at fromIndex shifts subsequent indices down by 1
        let toIndex = rawTarget;
        if (fromIndex < toIndex) {
          toIndex--;
        }

        draggingIndex = -1;
        if (fromIndex === toIndex) {
          renderOps();
          return;
        }
        if (validDropSlots.get(rawTarget) === false) {
          showGateMsg(GATE_REASON);
          renderOps();
          return;
        }
        renderOps(); // snap the drag preview back now; the commit re-renders
        queueCommit(async () => {
          const candidate = movedOps(state.ops, fromIndex, toIndex);
          if (!(await chainIsValid(state.base, candidate))) {
            showGateMsg(GATE_REASON);
            return;
          }
          state.ops = candidate;
          renderOps();
          update();
        });
      };

      state.ops.forEach((o, i) => {
        const opDef = OP_DEFS[o.op];
        const el = document.createElement('div');
        el.className = 'op-item flex-col items-stretch text-xs text-indigo-300';
        el.draggable = false;

        // Item Drag Start/End
        el.addEventListener('dragstart', (e) => {
          draggingIndex = i;
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', i); // Required for Firefox
          precomputeDropSlots(i);
          setTimeout(() => el.classList.add('dragging'), 0);
        });

        el.addEventListener('dragend', () => {
          el.draggable = false;
          el.classList.remove('dragging');
          draggingIndex = -1;
          if (list) {
            [...list.children].forEach(c => c.style.transform = '');
          }
        });

        let controlsHtml = '';
        if (opDef.params && Object.keys(opDef.params).length > 0) {
          controlsHtml = '<div class="mt-1 space-y-1">';
          Object.keys(opDef.params).forEach(key => {
            const def = opDef.params[key];
            const val = o.params[key];
            // data-key tags the row; the inputs are wired via addEventListener
            // after innerHTML (no inline oninput/onchange/onmousedown attrs).
            controlsHtml += `
              <div class="op-param flex items-center text-[0.6rem] space-x-1" data-key="${key}" draggable="false">
                <span class="w-12 text-slate-400 capitalize truncate">${key}</span>
                <input type="range"
                  min="${def.min}" max="${def.max}" step="${def.step}" value="${val}"
                  class="flex-1 h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer min-w-0"
                />
                <input type="number" min="${def.min}" max="${def.max}" step="${def.step}" value="${Number(val).toFixed(2)}"
                  class="w-12 bg-transparent text-right font-mono text-slate-500 focus:outline-none focus:text-white [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                />
                <span class="text-[0.5rem] text-slate-600 ml-0.5">${key === 'angle' ? 'deg' : ''}</span>
              </div>
                         `;
          });
          controlsHtml += '</div>';
        }

        el.innerHTML = `
        <div class="flex justify-between items-center w-full" draggable="false">
          <div class="flex items-center">
            <div class="drag-handle">
              <svg viewBox="0 0 24 24"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </div>
            <span class="font-bold">${i + 1}. ${o.op.toUpperCase()}</span>
          </div>
          <button class="remove-op-btn text-slate-500 hover:text-white" draggable="false">&times;</button>
        </div>
        ${controlsHtml}
      `;

        // Wire the drag handle, remove button, and per-param inputs without
        // inline attributes — handlers stay module-scoped (no window.*).
        const handle = el.querySelector('.drag-handle');
        handle.addEventListener('mousedown', enableDrag);
        handle.addEventListener('touchstart', enableDrag);
        el.querySelector('.remove-op-btn').addEventListener('click', () => removeOp(i));
        el.querySelectorAll('.op-param').forEach((row) => {
          const key = row.dataset.key;
          const range = row.querySelector('input[type="range"]');
          const number = row.querySelector('input[type="number"]');
          range.addEventListener('input', (e) => updateOpParam(i, key, e.target.value));
          number.addEventListener('change', (e) => updateOpParam(i, key, e.target.value));
          // Don't let an input drag start the row reorder (was inline onmousedown).
          range.addEventListener('mousedown', (e) => e.stopPropagation());
          number.addEventListener('mousedown', (e) => e.stopPropagation());
        });

        list.appendChild(el);
      });
    }

    function updateOpParam(index, key, value) {
      // Clamp to the op's declared range and reject non-numeric input before it
      // reaches state — the number box has no inherent bounds and the WASM mesh
      // boundary is deliberately fail-fast, so an out-of-range or NaN value
      // typed here could kill the page or produce garbage geometry. On a bad
      // value, fall back to the current value (the sync below restores the UI).
      const def = OP_DEFS[state.ops[index].op]?.params?.[key];
      let val = parseFloat(value);
      if (Number.isNaN(val)) {
        val = state.ops[index].params[key];
      } else if (def) {
        val = Math.min(def.max, Math.max(def.min, val));
      }
      state.ops[index].params[key] = val;

      // Sync UI elements
      const item = document.getElementById('opsList').children[index];
      if (item) {
        const paramIndex = Object.keys(state.ops[index].params).indexOf(key);
        const slider = item.querySelectorAll('input[type="range"]')[paramIndex];
        const input = item.querySelectorAll('input[type="number"]')[paramIndex];

        if (slider) slider.value = val;
        if (input) input.value = val.toFixed(2);
      }
      scheduleUpdate();
    }

    // Serializes validated state mutations: each commit sees the state its
    // predecessors left, so two rapid clicks can't validate against the same
    // snapshot and then both land.
    let commitQueue = Promise.resolve();
    function queueCommit(fn) {
      commitQueue = commitQueue.then(fn).catch(console.error);
      return commitQueue;
    }

    function removeOp(index) {
      queueCommit(async () => {
        // Removing an op can invalidate the remainder (e.g. deleting the ambo
        // between two hankins), so removal validates like any other mutation.
        const candidate = state.ops.filter((_, i) => i !== index);
        if (!(await chainIsValid(state.base, candidate))) {
          showGateMsg(GATE_REASON);
          return;
        }
        state.ops = candidate;
        renderOps();
        update();
      });
    }

    function addOp(opName) {
      const def = OP_DEFS[opName];
      const newOp = { op: opName, params: {} };
      if (def && def.params) {
        Object.keys(def.params).forEach(k => {
          let val = def.params[k].val;
          if (opName === 'hankin' && k === 'angle') {
            // computeInternalAngle returns 0 for a null/load-failed mesh; keep
            // the OP_DEFS default rather than seeding a degenerate 0deg angle.
            const derived = (computeInternalAngle(currentMesh) / 2) * (180 / Math.PI);
            if (derived > 0) val = derived;
          }
          newOp.params[k] = val;
        });
      }
      queueCommit(async () => {
        // The grid button is usually grayed before an invalid op can be
        // clicked, but gating is async — validate the exact candidate anyway.
        if (!(await chainIsValid(state.base, [...state.ops, newOp]))) {
          showGateMsg(GATE_REASON);
          return;
        }
        state.ops.push(newOp);
        renderOps();
        update();
      });
    }

    function resetOps() {
      state.ops = [];
      renderOps();
      update();
    }

    function clearSavedSolids() {
      savedSolids.length = 0;
      renderSavedList();
    }

    // Apply one op of the state.ops encoding to a WASM mesh wrapper, returning
    // the new mesh (or null for an unknown op name). Single source of truth for
    // op dispatch: update() (live module) and chainIsValid() (validator module)
    // must run byte-identical chains or validation proves the wrong thing.
    function applyOp(mesh, o) {
      const opName = typeof o === 'string' ? o : o.op;
      if (opName === 'truncate') return mesh.truncate(o.params.t);
      if (opName === 'chamfer') return mesh.chamfer(o.params.t);
      if (opName === 'expand') return mesh.expand(o.params.t);
      if (opName === 'bevel') return mesh.bevel(o.params.t);
      if (opName === 'snub') return mesh.snub(o.params.t, o.params.twist);
      if (opName === 'hankin') return mesh.hankin(o.params.angle * (Math.PI / 180));
      if (opName === 'relax') return mesh.relax(o.params.iter);
      if (mesh[opName]) return mesh[opName]();
      return null;
    }

    // --- CHAIN VALIDATION ---
    // The engine fail-fast contract (see the comment block in update()) means an
    // op chain that outgrows an engine ceiling — 16-bit vertex/index ranges,
    // hankin's compile bound, classifyFaces' range — traps and permanently
    // wedges the module it ran on. Rather than mirror every ceiling in JS (the
    // op set's growth rules are engine-specific and would drift), the tool
    // proves each candidate chain on a SACRIFICIAL module instance before the
    // live module ever sees it: a trap kills only the validator, which is
    // respawned, and the mutation is rejected. The engine stays the single
    // authority on its own invariants.
    let validatorPromise = null;
    // Serializes all validator use: tasks hold the single instance (and
    // sometimes a live mesh wrapper) across awaits, and an interleaved
    // clearToolingMemory from another task would invalidate that wrapper.
    let validatorQueue = Promise.resolve();

    function withValidator(task) {
      const run = validatorQueue.then(async () => {
        validatorPromise ||= createHolosphereModule();
        const Mod = await validatorPromise.catch(() => null);
        return task(Mod);
      });
      // Keep the queue alive past a rejected task.
      validatorQueue = run.catch(() => { });
      return run;
    }

    // A RuntimeError means the validator instance trapped and is wedged; drop
    // it so the next task spawns a fresh one.
    function noteValidatorDeath(e) {
      if (e instanceof WebAssembly.RuntimeError) validatorPromise = null;
    }

    // Replay base+ops (plus the classifyFaces pass update() always runs) on the
    // validator. Resolves true if the whole chain is safe for the live module.
    // A missing validator (module failed to spawn) resolves true: prevention
    // degrades to the old behavior rather than blocking the tool.
    function chainIsValid(base, ops) {
      return withValidator((Mod) => {
        if (!Mod) return true;
        const Ops = Mod.MeshOps;
        let mesh = null;
        try {
          mesh = Ops.fromSolidName(base);
          for (const o of ops) {
            const next = applyOp(mesh, o);
            if (next) { mesh.delete(); mesh = next; }
          }
          mesh.classifyFaces();
          mesh.delete();
          Ops.clearToolingMemory();
          return true;
        } catch (e) {
          noteValidatorDeath(e);
          if (!(e instanceof WebAssembly.RuntimeError)) {
            try { if (mesh) mesh.delete(); Ops.clearToolingMemory(); } catch (_) { }
          }
          return false;
        }
      });
    }

    let gateMsgTimer = null;
    function showGateMsg(text) {
      const el = document.getElementById('opGateMsg');
      if (!el) return;
      el.innerText = text;
      clearTimeout(gateMsgTimer);
      gateMsgTimer = setTimeout(() => { el.innerText = ''; }, 3000);
    }
    const GATE_REASON = 'rejected: would exceed an engine mesh limit';

    // Gray out add-op buttons whose op would trap on the CURRENT mesh. One
    // chain build serves all 14 probes (ops never mutate their input); a probe
    // trap kills the validator, so the chain is rebuilt on a fresh instance and
    // probing continues with the next op.
    let gateGen = 0;
    let lastGateSig = null;
    async function refreshOpGating() {
      // Gating depends only on the mesh's topology, which op params never
      // change — skip the probe pass when only a param slider moved.
      const sig = state.base + '|' + state.ops.map(o => o.op).join(',');
      if (sig === lastGateSig) return;
      lastGateSig = sig;

      const gen = ++gateGen;
      const base = state.base;
      const ops = structuredClone(state.ops);
      const buttons = [...document.querySelectorAll('#addOpGrid [data-op]')];

      const invalid = await withValidator(async (Mod) => {
        if (!Mod) return new Set();
        const bad = new Set();
        const build = (M) => {
          let mesh = M.MeshOps.fromSolidName(base);
          for (const o of ops) {
            const next = applyOp(mesh, o);
            if (next) { mesh.delete(); mesh = next; }
          }
          return mesh;
        };
        let mesh;
        try {
          mesh = build(Mod); // current chain: valid by construction
        } catch (e) {
          noteValidatorDeath(e);
          return bad;
        }
        for (const btn of buttons) {
          const op = btn.dataset.op;
          const candidate = { op, params: {} };
          for (const [k, def] of Object.entries(OP_DEFS[op]?.params ?? {})) {
            candidate.params[k] = def.val;
          }
          try {
            const out = applyOp(mesh, candidate);
            if (out) {
              out.classifyFaces(); // committing would classify; probe that too
              out.delete();
            }
          } catch (e) {
            bad.add(op);
            noteValidatorDeath(e);
            if (e instanceof WebAssembly.RuntimeError) {
              // Instance is wedged; respawn and rebuild for remaining probes.
              validatorPromise ||= createHolosphereModule();
              Mod = await validatorPromise.catch(() => null);
              if (!Mod) return bad;
              try { mesh = build(Mod); } catch (e2) { noteValidatorDeath(e2); return bad; }
            }
          }
        }
        try { mesh.delete(); Mod.MeshOps.clearToolingMemory(); } catch (e) { noteValidatorDeath(e); }
        return bad;
      });

      if (gen !== gateGen) return; // state changed while probing
      for (const btn of buttons) {
        const blocked = invalid.has(btn.dataset.op);
        btn.disabled = blocked;
        if (blocked) btn.title = 'Would exceed an engine mesh limit on the current solid';
        else btn.removeAttribute('title');
      }
    }

    // The live module is unrecoverable after an engine trap (see update()); if
    // one ever escapes the validator gate, fail loudly once instead of letting
    // every later call trap the re-entrancy guard and spam the console.
    function engineTrapped(e) {
      if (!(e instanceof WebAssembly.RuntimeError)) return false;
      MeshOpsWasm = null;
      WasmModule = null;
      showFatalError('The WASM engine hit an internal invariant and is halted — '
        + 'reload the page. (The op that caused this slipped past validation; '
        + 'please report the chain.)');
      return true;
    }

    function update() {
      if (!WasmModule || !MeshOpsWasm) return;

      // MeshOps error-handling contract (the JS-facing surface of the WASM mesh
      // kernel). The module is built with exceptions disabled
      // (-fno-exceptions / DISABLE_EXCEPTION_CATCHING), so an engine-side failure
      // — an internal HS_CHECK firing, or a mesh that grows past the tooling
      // arena's capacity — calls abort() and tears down the ENTIRE module. It
      // does NOT surface as a catchable JS exception. The try/catch blocks below
      // therefore only catch Embind-level marshalling errors (e.g. passing a bad
      // argument type across the boundary); they can never recover from an
      // engine overflow or invariant trap, which is fatal to the page by design.
      // The C++ wrapper deliberately pre-rejects the *known* recoverable case —
      // an unknown solid name (fromSolidName) — returning an empty mesh instead
      // of aborting; but an arbitrary op chain that simply outgrows the arena
      // has no such guard and will abort.

      // 1. Generate Mesh directly from WASM
      let currentWasmMesh = null;
      try {
        // Use the string name directly
        currentWasmMesh = MeshOpsWasm.fromSolidName(state.base);
      } catch (e) {
        console.error("Error creating base solid:", e);
        engineTrapped(e);
        return;
      }

      // Apply Ops
      try {
        state.ops.forEach(o => {
          const nextMesh = applyOp(currentWasmMesh, o);
          if (nextMesh) {
            currentWasmMesh.delete();
            currentWasmMesh = nextMesh;
          }
        });
      } catch (e) {
        console.error("WASM Op Error:", e);
        if (engineTrapped(e)) return;
        // A mid-chain op failed: the partial mesh is meaningless, so surface the
        // error and skip the render rather than displaying a half-applied solid
        // with wrong stats. currentWasmMesh still points at the last valid op
        // result (the failing op threw before the swap), so it is safe to free.
        currentWasmMesh.delete();
        MeshOpsWasm.clearToolingMemory();
        const statsEl = document.getElementById('meshStats');
        if (statsEl) statsEl.innerText = `Op error: ${e?.message || e}`;
        return;
      }

      // Per-face topology class ids for the Colorize Faces toggle. Runs
      // engine-side (it reuses the tooling scratch arenas, which are free
      // between ops); the returned Int32Array is a fresh JS copy, so it stays
      // valid after the wrapper is deleted and the arenas are flushed below.
      // Computed on every recompute (it is cheap next to the op chain) and
      // cached so toggling Colorize redraws from currentMesh without replaying
      // the whole WASM chain.
      currentFaceClasses = null;
      try {
        currentFaceClasses = currentWasmMesh.classifyFaces();
      } catch (e) {
        console.error("WASM classifyFaces error:", e);
        if (engineTrapped(e)) return;
      }

      const meshData = wasmMeshToJs(currentWasmMesh);
      currentWasmMesh.delete(); // Cleanup final result
      MeshOpsWasm.clearToolingMemory(); // Flush the 16 MB tooling arenas (8 MB + 4 MB + 4 MB)

      // Store for stats/helpers
      currentMesh = meshData;

      renderMesh();

      // The mesh changed, so which ops would now overflow changed too.
      refreshOpGating();
    }

    // Rebuild the THREE scene from the cached currentMesh + currentFaceClasses,
    // WITHOUT re-running the WASM op chain. update() calls this after a
    // recompute; presentation-only toggles (faces/verts/normals/indices/
    // colorize/geodesics) call it directly so they don't pay for the chain
    // (relax alone runs up to 500 iterations) when only the view changed.
    function renderMesh() {
      const meshData = currentMesh;
      if (!meshData) return;

      // Colorize is applied only when faces are shown; otherwise the per-vertex
      // color attribute would be built for hidden geometry.
      const faceClasses = (state.colorizeFaces && state.showFaces) ? currentFaceClasses : null;

      if (mainMesh) {
        mainMesh.geometry.dispose();
        scene.remove(mainMesh);
      }
      if (edgeLines) {
        edgeLines.geometry.dispose();
        scene.remove(edgeLines);
      }
      if (vertPoints) {
        vertPoints.geometry.dispose();
        scene.remove(vertPoints);
      }
      if (normalLines) {
        normalLines.geometry.dispose();
        scene.remove(normalLines);
      }
      if (labelsContainer) labelsContainer.innerHTML = '';

      // Faces
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      const faceColors = []; // per-vertex RGB, filled only when colorizing
      const classColor = new THREE.Color();

      const faceCenters = [];
      const faceNormals = [];

      // Geodesic mode curves the faces onto the sphere: each fan triangle is
      // split on a barycentric grid of geoN segments per side and every grid
      // vertex normalized, so the surface itself is spherical instead of flat
      // plateaus with ridges at the (curved) edge overlay. geoN must be
      // UNIFORM across the whole mesh: any shared edge — polygon boundaries
      // and the internal fan diagonals alike — is then split into identical
      // points from both sides, so the tessellation is watertight. (A
      // per-triangle level cracked along every count mismatch, which read as
      // dark hairlines on the faces.) geoN targets ~3° of arc per segment on
      // the largest face and is capped by a total-triangle budget so dense
      // meshes, whose faces are sub-degree anyway, don't explode.
      let geoN = 1;
      if (state.showGeodesics) {
        let triCount = 0;
        let maxArc = 0;
        meshData.faces.forEach(f => {
          triCount += f.length - 2;
          for (let i = 1; i < f.length - 1; i++) {
            const a = meshData.vertices[f[0]];
            const b = meshData.vertices[f[i]];
            const c = meshData.vertices[f[i + 1]];
            maxArc = Math.max(maxArc, a.angleTo(b), b.angleTo(c), c.angleTo(a));
          }
        });
        const nArc = Math.ceil(maxArc / (Math.PI / 60));
        const nBudget = Math.floor(Math.sqrt(400000 / Math.max(1, triCount)));
        geoN = Math.max(1, Math.min(24, nArc, nBudget));
      }

      const pushVert = (v) => {
        vertices.push(v.x, v.y, v.z);
        if (faceClasses) {
          faceColors.push(classColor.r, classColor.g, classColor.b);
        }
      };

      // Emit one fan triangle as geoN² spherical sub-triangles. Grid point
      // P(gi,gj) = normalize(a + (b-a)·gi/n + (c-a)·gj/n), rows shrinking
      // toward the b corner (gi + gj <= n).
      const emitSphericalTri = (a, b, c) => {
        const n = geoN;
        const P = [];
        for (let gi = 0; gi <= n; gi++) {
          const row = [];
          for (let gj = 0; gj <= n - gi; gj++) {
            row.push(new THREE.Vector3()
              .addScaledVector(a, 1 - (gi + gj) / n)
              .addScaledVector(b, gi / n)
              .addScaledVector(c, gj / n)
              .normalize());
          }
          P.push(row);
        }
        for (let gi = 0; gi < n; gi++) {
          for (let gj = 0; gj < n - gi; gj++) {
            pushVert(P[gi][gj]);
            pushVert(P[gi + 1][gj]);
            pushVert(P[gi][gj + 1]);
            if (gj < n - gi - 1) {
              pushVert(P[gi + 1][gj]);
              pushVert(P[gi + 1][gj + 1]);
              pushVert(P[gi][gj + 1]);
            }
          }
        }
      };

      meshData.faces.forEach((f, fi) => {
        if (faceClasses) {
          // Golden-ratio hue stride keeps consecutive class ids far apart on
          // the color wheel, so adjacent face groups stay distinguishable.
          classColor.setHSL((faceClasses[fi] * 0.618034) % 1, 0.65, 0.55);
        }
        // Collect vertices for the triangulated face
        if (!state.showGeodesics) {
          for (let i = 1; i < f.length - 1; i++) {
            pushVert(meshData.vertices[f[0]]);
            pushVert(meshData.vertices[f[i]]);
            pushVert(meshData.vertices[f[i + 1]]);
          }
        } else {
          // Geodesic mode fans from the CENTROID, not f[0]: Hankin star faces
          // are non-convex, and a corner fan spills triangles outside the
          // polygon — pressed onto the unit sphere, that spill z-fights the
          // neighbouring faces as dark speckle. Every face the tool produces
          // is star-shaped about its centroid, so a centroid fan tiles it
          // exactly.
          const centroid = new THREE.Vector3();
          f.forEach(idx => centroid.add(meshData.vertices[idx]));
          centroid.divideScalar(f.length);
          for (let i = 0; i < f.length; i++) {
            emitSphericalTri(centroid,
              meshData.vertices[f[i]],
              meshData.vertices[f[(i + 1) % f.length]]);
          }
        }

        // Center/Normal for other viz
        const center = new THREE.Vector3();
        f.forEach(idx => {
          let v = new THREE.Vector3().copy(meshData.vertices[idx]);
          if (state.showGeodesics) v.normalize();
          center.add(v);
        });
        center.divideScalar(f.length);
        faceCenters.push(center);

        // Normal
        const v0 = meshData.vertices[f[0]];
        const v1 = meshData.vertices[f[1]];
        const v2 = meshData.vertices[f[f.length - 1]];
        const n = new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(v1, v0), new THREE.Vector3().subVectors(v2, v0)).normalize();
        faceNormals.push(n);
      });

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      if (state.showGeodesics) {
        // Every emitted vertex sits on the unit sphere, so its normal IS its
        // position; computeVertexNormals on this non-indexed geometry would
        // yield per-triangle normals and shade the tessellation as facets.
        geometry.setAttribute('normal', new THREE.Float32BufferAttribute([...vertices], 3));
      } else {
        geometry.computeVertexNormals();
      }
      if (faceClasses) {
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(faceColors, 3));
      }

      // Flat shading reads face normals in-shader (ignoring the normal
      // attribute), which is right for the polyhedral look but would facet the
      // sphere; geodesic mode needs the smooth normals set above.
      const wantFlat = !state.showGeodesics;
      for (const m of [faceMaterial, faceColorizeMaterial]) {
        if (m.flatShading !== wantFlat) {
          m.flatShading = wantFlat;
          m.needsUpdate = true;
        }
      }

      mainMesh = new THREE.Mesh(geometry, faceClasses ? faceColorizeMaterial : faceMaterial);
      if (state.showFaces) scene.add(mainMesh);

      // Vertices
      if (state.showVertices) {
        const dotGeo = new THREE.BufferGeometry().setFromPoints(meshData.vertices);
        vertPoints = new THREE.Points(dotGeo, vertMaterial);
        scene.add(vertPoints);
      }

      // Edges
      const edges = uniqueEdges(meshData.faces, meshData.vertices.length);

      // Persist the edge count on the mesh (same object as currentMesh)
      // so saveSolid reports E instead of falling back to 0 — wasmMeshToJs only
      // returns {vertices, faces}, so without this every saved card shows 0E.
      meshData.edgeCount = edges.length;

      const lineGeoPoints = [];
      for (const [ai, bi] of edges) {
        const va = meshData.vertices[ai];
        const vb = meshData.vertices[bi];

        if (state.showGeodesics) {
          const steps = 12;
          for (let j = 0; j < steps; j++) {
            const t1 = j / steps;
            const t2 = (j + 1) / steps;
            const p1 = new THREE.Vector3().copy(va).lerp(vb, t1).normalize().multiplyScalar(1.002);
            const p2 = new THREE.Vector3().copy(va).lerp(vb, t2).normalize().multiplyScalar(1.002);
            lineGeoPoints.push(p1, p2);
          }
        } else {
          lineGeoPoints.push(va, vb);
        }
      }

      const lineGeo = new THREE.BufferGeometry().setFromPoints(lineGeoPoints);
      edgeLines = new THREE.LineSegments(lineGeo, edgeMaterial);
      scene.add(edgeLines);

      // Normals
      if (state.showNormals) {
        const normalPoints = [];
        const colors = [];
        faceCenters.forEach((c, i) => {
          const n = faceNormals[i];
          const p2 = c.clone().add(n.multiplyScalar(0.15));
          normalPoints.push(c, p2);
          colors.push(0, 1, 0, 0, 1, 0);
        });
        const normGeo = new THREE.BufferGeometry().setFromPoints(normalPoints);
        normGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        normalLines = new THREE.LineSegments(normGeo, normalMaterial);
        scene.add(normalLines);
      }

      // Indices (limit to < 1000). Build into a DocumentFragment and insert in a
      // single appendChild so up to ~1000 labels cost one DOM mutation instead
      // of one per vertex. Flag the labels for re-projection so updateLabels
      // positions the freshly-created set on the next frame.
      if (state.showIndices && meshData.vertices.length < 1000) {
        const frag = document.createDocumentFragment();
        meshData.vertices.forEach((v, i) => {
          const el = document.createElement('div');
          el.textContent = i;
          el.className = 'absolute text-[0.75rem] font-mono text-white bg-black/50 px-1 rounded transform -translate-x-1/2 -translate-y-1/2 pointer-events-none';
          el.dataset.index = i;
          frag.appendChild(el);
        });
        labelsContainer.appendChild(frag);
        labelsNeedReproject = true;
      }

      // Update Stats
      renderBaseSolid();
      document.getElementById('meshStats').innerText = `${meshData.vertices.length}V / ${edges.length}E / ${meshData.faces.length}F`;
    }

    // Set true whenever the label set is (re)built, so updateLabels re-projects
    // it once even if the camera happens not to have moved that frame.
    let labelsNeedReproject = false;
    // Cached camera transform from the last projection — lets updateLabels skip
    // the ~1000-label loop on frames where the camera is identical (autorotate
    // paused and no user input). During autorotation the camera changes every
    // frame, so the loop runs as before.
    const _labelCam = { px: NaN, py: NaN, pz: NaN, qx: NaN, qy: NaN, qz: NaN, qw: NaN };
    function labelCameraMoved() {
      const p = camera.position, q = camera.quaternion;
      if (p.x === _labelCam.px && p.y === _labelCam.py && p.z === _labelCam.pz &&
          q.x === _labelCam.qx && q.y === _labelCam.qy && q.z === _labelCam.qz && q.w === _labelCam.qw) {
        return false;
      }
      _labelCam.px = p.x; _labelCam.py = p.y; _labelCam.pz = p.z;
      _labelCam.qx = q.x; _labelCam.qy = q.y; _labelCam.qz = q.z; _labelCam.qw = q.w;
      return true;
    }

    // Project vertex-index labels onto the canvas. Runs each frame after the
    // render (via initScene's onAfterRender hook), so the labels track the
    // current camera; guarded because the loop starts before init finishes.
    function updateLabels() {
      if (state.showIndices && currentMesh && labelsContainer && labelsContainer.children.length > 0) {
        // Nothing to do when neither the camera nor the label set changed since
        // the last projection. (A canvas resize without camera motion is the one
        // gap; autorotate — on by default — refreshes positions within a frame.)
        const moved = labelCameraMoved();
        if (!moved && !labelsNeedReproject) return;
        labelsNeedReproject = false;

        const rect = renderer.domElement.getBoundingClientRect();
        const tempV = new THREE.Vector3();
        const camPos = camera.position;

        Array.from(labelsContainer.children).forEach(el => {
          const i = parseInt(el.dataset.index);
          const v = currentMesh.vertices[i];
          if (v) {
            // Backface Culling for Labels
            const dot = v.dot(camPos) - v.lengthSq();

            if (dot < 0) {
              el.style.display = 'none';
              return;
            }

            tempV.copy(v);
            tempV.project(camera);

            // Check if behind camera frustum (NDC z)
            if (tempV.z > 1) {
              el.style.display = 'none';
            } else {
              el.style.display = 'block';
              const x = (tempV.x * rect.width / 2) + rect.width / 2;
              const y = -(tempV.y * rect.height / 2) + rect.height / 2;
              el.style.left = `${x}px`;
              el.style.top = `${y}px`;
            }
          }
        });
      }
    }



    // addEventListener (not window.onload =) avoids clobbering any other load
    // handler; .catch surfaces an init failure (init() returns a promise) that a
    // bare assignment would otherwise swallow.
    window.addEventListener('load', () => {
      init().catch((e) => {
        console.error('Solids tool failed to initialize:', e);
        showFatalError('The solids tool failed to initialize — see the browser console for details.');
      });
    });

  </script>
</body>

</html>
