<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobius Transformation Visualizer</title>
  <!-- Vendored Tailwind (Play CDN build) for offline dev. /vendor/ is
       gitignored, so on the Pages deploy this file 404s; the onerror falls back
       to the Play CDN — the same in-browser build — instead of serving the tool
       unstyled. -->
  <script src="../vendor/tailwindcss.js"
    onerror="this.remove();document.head.appendChild(Object.assign(document.createElement('script'),{src:'https://cdn.tailwindcss.com'}))"></script>
  <script src="../vendor-importmap.js"></script>
  <link rel="stylesheet" href="tools.css">
  <style>
    :root {
      --panel-height: 280px;
      --sidebar-width: 240px;
    }

    body {
      overflow: hidden;
      margin: 0;
    }

    #canvasContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: calc(100vw - var(--sidebar-width));
      height: calc(100vh - var(--panel-height));
      z-index: 10;
    }

    #presetSidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--sidebar-width);
      height: calc(100vh - var(--panel-height));
      background-color: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      border-left: 1px solid var(--slate-700);
      z-index: 15;
      padding: 1.5rem;
      overflow-y: auto;
    }

    /* Mobile-only presets dropdown; the sidebar list is shown on desktop. */
    #presetSelect {
      display: none;
      max-width: 55%;
    }

    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: var(--panel-height);
      z-index: 20;
      background-color: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(8px);
      box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.4);
      border-top: 1px solid var(--slate-700);
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }

    .preset-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      background-color: var(--slate-800);
      border: 1px solid var(--slate-700);
      border-radius: 0.5rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .preset-btn:hover {
      background-color: var(--slate-700);
      border-color: var(--indigo-400);
    }

    .preset-btn.active {
      background-color: rgba(59, 130, 246, 0.2);
      border-color: var(--blue-500);
      color: white;
    }

    .preset-desc {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.25rem;
      line-height: 1.2;
    }

    #parameters {
      display: flex;
      flex-direction: row;
      gap: 1.5rem;
      justify-content: center;
      align-items: flex-start;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      height: 100%;
      width: 100%;
    }

    .param-group {
      /* Visual base (background/border-radius/box-shadow) is inherited from
         tools.css; mobius packs param-groups into a horizontal scrolling panel,
         so it overrides padding/margin and adds the column layout. */
      padding: 0.75rem;
      margin-bottom: 0;
      width: 160px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .complex-plane-control {
      position: relative;
      width: 100%;
      padding-top: 100%;
      background-color: #0f172a;
      border-radius: 0.5rem;
      border: 1px solid var(--slate-800);
      cursor: grab;
      margin-top: 0.5rem;
      overflow: hidden;
      touch-action: none;
    }

    /* Visible keyboard-focus ring for the now-focusable (tabindex) pad. */
    .complex-plane-control:focus-visible {
      outline: 2px solid var(--blue-500);
      outline-offset: 2px;
    }

    .complex-plane-inner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .complex-plane-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--blue-500);
      border: 2px solid #ffffff;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
      z-index: 10;
    }

    .axis-h {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background-color: #475569;
    }

    .axis-v {
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      width: 1px;
      background-color: #475569;
    }

    .complex-plane-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--indigo-400);
      text-align: center;
      margin-top: 0.5rem;
      white-space: nowrap;
      user-select: none;
      width: 100%;
    }

    #parameters::-webkit-scrollbar {
      height: 6px;
    }

    #parameters::-webkit-scrollbar-track {
      background: var(--slate-800);
      border-radius: 3px;
    }

    #parameters::-webkit-scrollbar-thumb {
      background: var(--slate-600);
      border-radius: 3px;
    }

    @media (max-width: 768px) {
      :root {
        --panel-height: 260px;
        --sidebar-width: 0px;
      }

      #canvasContainer {
        width: 100vw;
        height: 50vh;
      }

      #presetSidebar {
        display: none;
      }

      /* Presets stay reachable via the controls-header dropdown (the sidebar
         list above is hidden on mobile). */
      #presetSelect {
        display: block;
      }

      #controls {
        height: 50vh;
      }

      .param-group {
        width: 130px;
      }

      #parameters {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <div id="canvasContainer">
    <canvas id="threeCanvas" class="w-full h-full"></canvas>
  </div>

  <div id="presetSidebar">
    <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Presets</h2>
    <div id="presetList"></div>
    <div class="mt-4 p-3 bg-slate-800 rounded border border-slate-700">
      <p class="text-xs text-indigo-300 italic">
        Drag any bottom control to stop animation.
      </p>
    </div>
  </div>

  <div id="controls">
    <div class="flex justify-between items-center mb-2 px-2 w-full max-w-7xl mx-auto">
      <div class="flex flex-col">
        <h1 class="text-lg font-bold text-white leading-tight">Mobius Visualizer</h1>
        <p class="text-xs text-indigo-300 font-mono">f(z) = (az + b) / (cz + d)</p>
        <p id="degenerateWarning" class="hidden text-xs text-amber-400 font-medium" role="status">
          ⚠ Degenerate transform (ad − bc ≈ 0): the map collapses to a constant.
        </p>
      </div>
      <select id="presetSelect" aria-label="Preset"
        class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium rounded border border-slate-500 px-2 py-1 mx-2 truncate">
        <option value="">Presets…</option>
      </select>
      <button id="resetBtn"
        class="px-3 py-1 bg-slate-600 hover:bg-slate-500 text-white rounded text-xs font-medium transition-colors shadow-sm border border-slate-500">
        Stop / Reset
      </button>
    </div>

    <div id="parameters" class="w-full max-w-7xl mx-auto">
      <div id="A_param_group" class="param-group">
        <h3 class="text-xs uppercase tracking-wider font-semibold text-indigo-400">Param A</h3>
        <div id="A_control_container" class="w-full"></div>
      </div>
      <div id="B_param_group" class="param-group">
        <h3 class="text-xs uppercase tracking-wider font-semibold text-indigo-400">Param B</h3>
        <div id="B_control_container" class="w-full"></div>
      </div>
      <div id="C_param_group" class="param-group">
        <h3 class="text-xs uppercase tracking-wider font-semibold text-indigo-400">Param C</h3>
        <div id="C_control_container" class="w-full"></div>
      </div>
      <div id="D_param_group" class="param-group">
        <h3 class="text-xs uppercase tracking-wider font-semibold text-indigo-400">Param D</h3>
        <div id="D_control_container" class="w-full"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { initScene, showFatalError } from './shared.js';
    import {
      elliptic, hyperbolic, loxodromic, parabolic,
      inversion, tumble, cayley, snapComplex,
      glslComplexFunctions,
    } from './mobius_transforms.js';

    const config = {
      A: { re: 1.0, im: 0.0 },
      B: { re: 0.0, im: 0.0 },
      C: { re: 0.0, im: 0.0 },
      D: { re: 1.0, im: 0.0 },
      MAX_EXTENT: 2.0,
    };

    const uiUpdaters = {};
    let isAnimating = false;
    let activePreset = null;
    let animationTime = 0;
    // Timestamp (ms) of the previous animated frame; 0 means "seed on next
    // frame". Used to advance animationTime by real elapsed time so preset
    // flow speed is independent of the display refresh rate.
    let lastAnimTime = 0;

    let scene, camera, renderer, controls, sphereMesh, wireMesh;

    const vertexShader = `
        varying vec3 vPosition;
        void main() {
          vPosition = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

    const fragmentShader = `
        ${glslComplexFunctions}
        uniform CNum u_a;
        uniform CNum u_b;
        uniform CNum u_c;
        uniform CNum u_d;
        varying vec3 vPosition;

        const float GRID_SCALE_R = 1.5;
        const float GRID_SCALE_THETA = 12.0;

        float pattern(float val, float thickness) {
          float fw = fwidth(val);
          float dist = abs(fract(val + 0.5) - 0.5);
          return 1.0 - smoothstep(0.0, fw * thickness, dist);
        }

        void main() {
          vec3 p = normalize(vPosition);
          float denom = 1.0 - p.z;
          CNum w;
          bool isInfinity = false;

          if (denom < 1e-4) { isInfinity = true; }
          else { w.re = p.x / denom; w.im = p.y / denom; }

          CNum w_prime;
          if (isInfinity) {
            float c_mag = length(vec2(u_c.re, u_c.im));
            if (c_mag < 1e-6) w_prime = CNum(100.0, 100.0);
            else w_prime = cdiv(u_a, u_c);
          } else {
            CNum aw = cmult(u_a, w);
            CNum num = cadd(aw, u_b);
            CNum cw = cmult(u_c, w);
            CNum den = cadd(cw, u_d);
            float den_mag = den.re*den.re + den.im*den.im;
            if (den_mag < 1e-6) w_prime = CNum(100.0, 100.0);
            else w_prime = cdiv(num, den);
          }

          float r = length(vec2(w_prime.re, w_prime.im));
          float theta = atan(w_prime.im, w_prime.re);
          float log_r = log(r + 0.0001);
          float u = log_r * GRID_SCALE_R;
          float v = (theta / 3.14159) * GRID_SCALE_THETA;

          float gridR = pattern(u, 1.5);
          float gridTheta = pattern(v, 1.5);
          float grid = max(gridR, gridTheta);

          vec3 colorBg = vec3(0.059, 0.09, 0.165);
          vec3 colorLine = vec3(0.506, 0.549, 0.973);
          vec3 baseColor = mix(colorBg, colorBg * 1.5, 0.5 + 0.5*sin(theta));
          vec3 finalColor = mix(baseColor, colorLine, grid);

          gl_FragColor = vec4(finalColor, 1.0);
        }
      `;

    const updateMobiusUniforms = () => {
      if (!sphereMesh || !sphereMesh.material.uniforms) return;
      const u = sphereMesh.material.uniforms;
      u.u_a.value.re = config.A.re; u.u_a.value.im = config.A.im;
      u.u_b.value.re = config.B.re; u.u_b.value.im = config.B.im;
      u.u_c.value.re = config.C.re; u.u_c.value.im = config.C.im;
      u.u_d.value.re = config.D.re; u.u_d.value.im = config.D.im;
      updateDegenerateWarning();
    };

    // A Möbius transform (az+b)/(cz+d) is invertible only when its complex
    // determinant ad − bc ≠ 0; at det ≈ 0 the map collapses to a constant and
    // the shader paints a flat (100,100) / (0,0) sentinel with no on-screen cue.
    // Surface that as a warning so a degenerate parameter set isn't read as a
    // rendering bug.
    const updateDegenerateWarning = () => {
      const el = document.getElementById('degenerateWarning');
      if (!el) return;
      const { A, B, C, D } = config;
      // det = a*d - b*c (complex multiplication).
      const detRe = (A.re * D.re - A.im * D.im) - (B.re * C.re - B.im * C.im);
      const detIm = (A.re * D.im + A.im * D.re) - (B.re * C.im + B.im * C.re);
      const degenerate = Math.hypot(detRe, detIm) < 1e-4;
      el.classList.toggle('hidden', !degenerate);
    };

    const applyConfig = (newVals) => {
      if (newVals.A) { config.A.re = newVals.A.re; config.A.im = newVals.A.im; }
      if (newVals.B) { config.B.re = newVals.B.re; config.B.im = newVals.B.im; }
      if (newVals.C) { config.C.re = newVals.C.re; config.C.im = newVals.C.im; }
      if (newVals.D) { config.D.re = newVals.D.re; config.D.im = newVals.D.im; }
      Object.values(uiUpdaters).forEach(u => u());
      updateMobiusUniforms();
    };

    const presets = [
      {
        id: 'identity',
        name: 'Identity',
        desc: 'Reset to default state. f(z) = z',
        animate: false,
        setup: () => ({ A: { re: 1, im: 0 }, B: { re: 0, im: 0 }, C: { re: 0, im: 0 }, D: { re: 1, im: 0 } })
      },
      {
        id: 'elliptic',
        name: 'Elliptic (Rotation)',
        desc: 'Continuous rotation around the poles.',
        animate: true,
        update: (t) => elliptic(t)
      },
      {
        id: 'hyperbolic',
        name: 'Hyperbolic (Zoom)',
        desc: 'Continuous flow from Source to Sink.',
        animate: true,
        update: (t) => hyperbolic(t)
      },
      {
        id: 'loxodromic',
        name: 'Loxodromic (Spiral)',
        desc: 'Seamless spiral flow.',
        animate: true,
        update: (t) => loxodromic(t)
      },
      {
        id: 'parabolic',
        name: 'Parabolic (Drift)',
        desc: 'Continuous translation along Real axis.',
        animate: true,
        update: (t) => parabolic(t)
      },
      {
        id: 'inversion',
        name: 'Inversion (Rotation)',
        desc: 'Continuous rotation around Real axis (swaps 0 and ∞).',
        animate: true,
        update: (t) => inversion(t)
      },
      {
        id: 'tumble',
        name: 'Tumble',
        desc: 'Rotation around Imaginary axis.',
        animate: true,
        update: (t) => tumble(t)
      },
      {
        id: 'cayley',
        name: 'Cayley Transform',
        desc: 'Transition: Identity -> Cayley.',
        animate: true,
        update: (t) => cayley(t)
      }
    ];

    const stopAnimation = () => {
      isAnimating = false;
      activePreset = null;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      // Clear the mobile dropdown back to its placeholder. <select> fires
      // 'change' only on a value change, so without this the just-stopped
      // preset stays selected and can't be re-tapped on mobile (where the
      // dropdown is the only preset UI).
      const presetSelect = document.getElementById('presetSelect');
      if (presetSelect) presetSelect.value = '';
    };

    const startPreset = (preset) => {
      stopAnimation(); // Stop any existing animation
      activePreset = preset;
      document.querySelectorAll('.preset-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.id === preset.id);
      });
      const presetSelect = document.getElementById('presetSelect');
      if (presetSelect) presetSelect.value = preset.id;

      if (preset.animate) {
        isAnimating = true;
        animationTime = 0;
        lastAnimTime = 0; // re-seed the delta clock for the new preset
      } else if (preset.setup) {
        applyConfig(preset.setup());
      }
    };

    const createComplexPlaneControl = (id, paramObj, maxExtent, onChange) => {
      const container = document.getElementById(`${id}_control_container`);
      if (!container) return;

      const controlId = `${id}_plane`;
      const dotId = `${id}_dot`;
      const labelId = `${id}_label`;

      // role="application" + tabindex make the otherwise mouse/touch-only pad
      // keyboard-reachable; the arrow-key handler below adjusts re/im. aria-label
      // is refreshed with the current value in updateUI so a screen reader
      // announces it on focus and after each change.
      container.innerHTML = `
          <div id="${controlId}" class="complex-plane-control" tabindex="0" role="application"
               aria-label="Parameter ${id} complex value. Use the arrow keys to adjust the real and imaginary parts.">
            <div class="complex-plane-inner">
              <div class="axis-h"></div>
              <div class="axis-v"></div>
              <div id="${dotId}" class="complex-plane-dot"></div>
            </div>
          </div>
          <div id="${labelId}" class="complex-plane-label"></div>
        `;

      const planeElement = document.getElementById(controlId);
      const dotElement = document.getElementById(dotId);
      const labelElement = document.getElementById(labelId);

      // Cache the last strings written to the DOM so a preset animation (which
      // calls applyConfig -> updateUI every frame) only touches the label/dot
      // when their rounded values actually change. Both outputs are quantized
      // (2-decimal text, clamped percent), so most frames are no-ops; skipping
      // them avoids ~12 redundant text/style mutations per frame at 60 Hz while
      // the shader uniforms keep updating every frame.
      let lastLabel = null, lastLeft = null, lastTop = null;
      const updateUI = () => {
        const re = paramObj.re;
        const im = paramObj.im;
        const sign = im >= 0 ? '+' : '-';
        const label = `${re.toFixed(2)} ${sign} ${Math.abs(im).toFixed(2)}i`;
        if (label !== lastLabel) {
          labelElement.textContent = label;
          // Keep the pad's accessible name in sync with its value so a screen
          // reader announces the new value after each keyboard/drag change.
          planeElement.setAttribute('aria-label', `Parameter ${id} = ${label}. Use the arrow keys to adjust the real and imaginary parts.`);
          lastLabel = label;
        }
        const xPercent = ((re / maxExtent) * 0.5 + 0.5) * 100;
        const yPercent = ((-im / maxExtent) * 0.5 + 0.5) * 100;
        const left = `${Math.min(100, Math.max(0, xPercent))}%`;
        const top = `${Math.min(100, Math.max(0, yPercent))}%`;
        if (left !== lastLeft) {
          dotElement.style.left = left;
          lastLeft = left;
        }
        if (top !== lastTop) {
          dotElement.style.top = top;
          lastTop = top;
        }
      };

      uiUpdaters[id] = updateUI;

      const handleInput = (clientX, clientY) => {
        if (isAnimating) stopAnimation();

        const rect = planeElement.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        let x = clientX - rect.left;
        let y = clientY - rect.top;
        let nx = (x / width) * 2 - 1;
        let ny = -((y / height) * 2 - 1);
        let re = nx * maxExtent;
        let im = ny * maxExtent;
        re = Math.max(-maxExtent, Math.min(maxExtent, re));
        im = Math.max(-maxExtent, Math.min(maxExtent, im));
        re = snapComplex(re);
        im = snapComplex(im);

        paramObj.re = re;
        paramObj.im = im;
        updateUI();
        onChange();
      };

      const onMouseDown = (e) => {
        e.preventDefault();
        handleInput(e.clientX, e.clientY);
        const onMouseMove = (ev) => handleInput(ev.clientX, ev.clientY);
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          planeElement.style.cursor = 'grab';
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        planeElement.style.cursor = 'grabbing';
      };

      const onTouchStart = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleInput(touch.clientX, touch.clientY);
        const onTouchMove = (ev) => {
          ev.preventDefault();
          const moveTouch = ev.touches[0];
          handleInput(moveTouch.clientX, moveTouch.clientY);
        };
        const onTouchEnd = () => {
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('touchend', onTouchEnd);
        };
        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onTouchEnd);
      }

      // Keyboard equivalent of dragging the dot: arrows nudge re/im (Shift for a
      // coarser step), Home recenters to the origin. Mirrors handleInput's
      // stop-animation / clamp / snap / notify sequence.
      const onKeyDown = (e) => {
        const step = e.shiftKey ? 0.2 : 0.05;
        let dRe = 0, dIm = 0;
        switch (e.key) {
          case 'ArrowLeft': dRe = -step; break;
          case 'ArrowRight': dRe = step; break;
          case 'ArrowUp': dIm = step; break;
          case 'ArrowDown': dIm = -step; break;
          case 'Home': break; // handled below as recenter
          default: return;
        }
        e.preventDefault();
        if (isAnimating) stopAnimation();
        let re = e.key === 'Home' ? 0 : paramObj.re + dRe;
        let im = e.key === 'Home' ? 0 : paramObj.im + dIm;
        // Scale the snap band to the key step so a single nudge escapes the
        // zero band (2*threshold) instead of latching back onto 0.
        re = snapComplex(Math.max(-maxExtent, Math.min(maxExtent, re)), step / 4);
        im = snapComplex(Math.max(-maxExtent, Math.min(maxExtent, im)), step / 4);
        paramObj.re = re;
        paramObj.im = im;
        updateUI();
        onChange();
      };

      planeElement.addEventListener('mousedown', onMouseDown);
      planeElement.addEventListener('touchstart', onTouchStart, { passive: false });
      planeElement.addEventListener('keydown', onKeyDown);
      updateUI();
    };

    const initThree = () => {
      const result = initScene('canvasContainer', 'threeCanvas', {
        cameraPosition: [2.5, 2.5, 4],
        maxDistance: 15,
        showSphere: false,
        onAnimate: () => {
          if (isAnimating && activePreset && activePreset.update) {
            const now = performance.now();
            // Seed on the first frame (dt = 0), then advance by real elapsed
            // seconds. 0.6 units/s reproduces the original 0.01-per-frame speed
            // at 60 Hz, now matched on any refresh rate.
            const dt = lastAnimTime ? (now - lastAnimTime) / 1000 : 0;
            lastAnimTime = now;
            animationTime += dt * 0.6;
            const newVals = activePreset.update(animationTime);
            applyConfig(newVals);
          }
        },
      });
      scene = result.scene;
      camera = result.camera;
      renderer = result.renderer;
      controls = result.controls;

      // Each struct uniform keeps its own stable value object; updateMobiusUniforms
      // mutates these in place so Three.js re-uploads without per-tick allocation.
      const uniforms = {
        u_a: { value: { re: config.A.re, im: config.A.im } },
        u_b: { value: { re: config.B.re, im: config.B.im } },
        u_c: { value: { re: config.C.re, im: config.C.im } },
        u_d: { value: { re: config.D.re, im: config.D.im } }
      };

      // 64x64 is plenty: the pattern is computed per-fragment from the
      // interpolated position (the vertex shader is a pass-through), so the
      // geometry only needs enough tessellation for a smooth silhouette and
      // low interpolation error — 128x128 (~16k verts) was ~4x more than
      // needed.
      const geometry = new THREE.SphereGeometry(1.5, 64, 64);
      const material = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        side: THREE.DoubleSide
      });

      sphereMesh = new THREE.Mesh(geometry, material);
      scene.add(sphereMesh);

      const wireGeo = new THREE.SphereGeometry(1.48, 32, 16);
      const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.05 });
      // Keep a reference so the decorative wireframe can be disposed on teardown.
      wireMesh = new THREE.Mesh(wireGeo, wireMat);
      scene.add(wireMesh);

      // Dispose both spheres' GPU resources on teardown (the page otherwise kept
      // no handle to the wireframe and had no dispose path at all), and run the
      // scaffold's dispose() to stop its render loop and drop the resize listener.
      window.addEventListener('pagehide', (e) => {
        if (e.persisted) return; // bfcache freeze, not a real discard
        for (const m of [sphereMesh, wireMesh]) {
          if (!m) continue;
          m.geometry.dispose();
          m.material.dispose();
        }
        result.dispose();
      }, { once: true });

      updateMobiusUniforms();
    };

    const init = () => {
      const presetList = document.getElementById('presetList');
      const presetSelect = document.getElementById('presetSelect');
      presets.forEach(preset => {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        btn.dataset.id = preset.id;
        btn.innerHTML = `
            <div class="font-semibold">${preset.name}</div>
            <div class="preset-desc">${preset.desc}</div>
          `;
        btn.onclick = () => startPreset(preset);
        presetList.appendChild(btn);

        const opt = document.createElement('option');
        opt.value = preset.id;
        opt.textContent = preset.name;
        presetSelect.appendChild(opt);
      });
      presetSelect.addEventListener('change', () => {
        const preset = presets.find(p => p.id === presetSelect.value);
        if (preset) startPreset(preset);
      });

      const onParamChange = () => updateMobiusUniforms();

      createComplexPlaneControl('A', config.A, config.MAX_EXTENT, onParamChange);
      createComplexPlaneControl('B', config.B, config.MAX_EXTENT, onParamChange);
      createComplexPlaneControl('C', config.C, config.MAX_EXTENT, onParamChange);
      createComplexPlaneControl('D', config.D, config.MAX_EXTENT, onParamChange);

      document.getElementById('resetBtn').addEventListener('click', () => {
        stopAnimation();
        applyConfig({ A: { re: 1, im: 0 }, B: { re: 0, im: 0 }, C: { re: 0, im: 0 }, D: { re: 1, im: 0 } });
      });

      initThree();
    };

    // addEventListener (not window.onload =) avoids clobbering any other load
    // handler, and the try/catch surfaces a synchronous init failure.
    window.addEventListener('load', () => {
      try {
        init();
      } catch (e) {
        console.error('Möbius tool failed to initialize:', e);
        showFatalError('The Möbius tool failed to initialize — see the browser console for details.');
      }
    });

  </script>
</body>

</html>
