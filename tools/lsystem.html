  <style>
    :root {
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --blue-500: #3b82f6;
      --indigo-400: #818cf8;

      --footer-height: calc((100vw - 510px) * 0.18);

    body {

      background-color: var(--slate-900);
      color: #E2E8F0;
      overflow: hidden;
      margin: 0;
      display: flex;
    }

    #sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      height: 100vh;
      background-color: rgba(15, 23, 42, 0.95);
      border-right: 1px solid var(--slate-700);
      display: flex;
      flex-direction: column;
      z-index: 20;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #main {
      flex: 1;
      min-width: 0;
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
      min-height: 0;
      overflow: hidden;
    }

    #footer {
      width: 100%;
      height: var(--footer-height);
      min-height: 80px;
      background-color: transparent;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(calc((100vw - 510px) * 0.08), 1fr));
      grid-auto-rows: calc((var(--footer-height) - 1.5rem) / 2);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.5rem;
      gap: 0.5rem;
      z-index: 10;
    }

    #footer::-webkit-scrollbar { height: 8px; }
    #footer::-webkit-scrollbar-track { background: var(--slate-900); }
    #footer::-webkit-scrollbar-thumb { background: var(--slate-700); border-radius: 4px; }

    .thumb-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--slate-800);
      border: 2px solid var(--slate-700);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      padding: calc((100vw - 510px) * 0.005);
      position: relative;
    }

    .thumb-btn:hover {
      border-color: var(--blue-500);
      background-color: var(--slate-700);
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    .thumb-btn.active {
      border-color: var(--blue-500);
      background-color: rgba(59, 130, 246, 0.15);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .thumb-btn img {
      height: 60%;
      object-fit: contain;
      margin-bottom: calc((100vw - 510px) * 0.004);
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }

    .thumb-btn span {
      font-size: calc((100vw - 510px) * 0.008);
      text-align: center;
      line-height: 1.1;
      color: #cbd5e1;
    }

    .btn {
      padding: 0.4rem 0.6rem;
      border-radius: 0.25rem;
      font-weight: 500;
      font-size: 0.875rem;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-primary { background-color: var(--blue-500); color: white; }
    .btn-primary:hover { background-color: #2563eb; }
    .btn-secondary { background-color: var(--slate-700); color: white; }
    .btn-secondary:hover { background-color: var(--slate-600); }

    #saveBtn {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background-color: rgba(15, 23, 42, 0.8);
      border: 2px solid var(--slate-700);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }

    #save-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 40;
    }

    #meshStats {
      background-color: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--slate-700);
      border-radius: 0.5rem;
      padding: 0.4rem 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: rgba(165, 180, 252, 0.8);
      text-transform: uppercase;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      pointer-events: none;
      white-space: nowrap;

    #saveBtn:hover {
      border-color: var(--blue-500);
      transform: scale(1.1);
    }

    #saveBtn svg {
      width: 1.5rem;
      height: 1.5rem;
      stroke: #fbbf24;
      fill: none;
      stroke-width: 2;
    }

    #right-sidebar {
      width: var(--right-sidebar-width);
      flex-shrink: 0;
      height: 100vh;
      background-color: rgba(15, 23, 42, 0.95);
      border-left: 1px solid var(--slate-700);

      flex-direction: column;
      z-index: 20;

      transition: all 0.2s;

      border-color: var(--blue-500);

    .saved-actions {

    .rule-input.pred { width: 1.8rem; text-align: center; }

<body>

  <div id="sidebar" class="p-4 space-y-4">
    <div>
      <h1 class="text-xl font-bold text-white mb-1">L-System Designer</h1>
      <p class="text-xs text-indigo-300">Spherical Lindenmayer Systems</p>
    </div>

    <!-- Axiom -->

      <label class="text-xs uppercase font-semibold text-slate-400">Axiom</label>
      <input id="axiomInput" type="text" spellcheck="false"

        value="F--F--F"
        oninput="onAxiomChange(this.value)">
    </div>

    <!-- Production Rules -->

      <div class="flex items-center justify-between">
        <label class="text-xs uppercase font-semibold text-slate-400">Production Rules</label>
        <button onclick="addRule()"
          class="text-[0.65rem] text-blue-400 hover:text-blue-300 uppercase font-bold tracking-wider">+ Add</button>
      </div>
      <div id="rulesList" class="space-y-1">
        <!-- Rules rendered here -->
      </div>
    </div>

    <!-- Parameters -->
    <div class="space-y-2 border-t border-slate-700 pt-3">
      <label class="text-xs uppercase font-semibold text-slate-400">Parameters</label>

      <div class="param-row">
        <label>Iterations</label>
        <input type="range" id="iterSlider" min="0" max="8" step="1" value="3"
          oninput="onParamChange('iterations', this.value)">
        <input type="number" id="iterNum" min="0" max="8" step="1" value="3"
          onchange="onParamChange('iterations', this.value)">
      </div>

      <div class="param-row">
        <label>Angle (°)</label>
        <input type="range" id="angleSlider" min="1" max="180" step="0.5" value="60"
          oninput="onParamChange('angle', this.value)">
        <input type="number" id="angleNum" min="1" max="180" step="0.5" value="60"
          onchange="onParamChange('angle', this.value)">
      </div>

      <div class="param-row">
        <label>Step</label>
        <input type="range" id="stepSlider" min="0.01" max="2.0" step="0.01" value="0.15"
          oninput="onParamChange('stepLength', this.value)">
        <input type="number" id="stepNum" min="0.01" max="2.0" step="0.01" value="0.150"
          onchange="onParamChange('stepLength', this.value)">
      </div>


      <div class="param-row">
        <label>Line Width</label>
        <input type="range" id="widthSlider" min="1" max="6" step="0.5" value="2"
          oninput="onParamChange('lineWidth', this.value)">
        <input type="number" id="widthNum" min="1" max="6" step="0.5" value="2.0"
          onchange="onParamChange('lineWidth', this.value)">
      </div>
    </div>

    <!-- Projection -->
    <div class="space-y-2 border-t border-slate-700 pt-3">
      <label class="text-xs uppercase font-semibold text-slate-400">Projection</label>
      <select id="projSelect" onchange="onProjectionChange(this.value)"
        class="w-full bg-slate-800 border border-slate-700 text-indigo-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500 cursor-pointer">
        <option value="equirectangular">Equirectangular</option>
        <option value="stereographic">Stereographic</option>
        <option value="gnomonic">Gnomonic</option>
      </select>
    </div>

    <!-- Visualization Options -->
    <div class="space-y-2 border-t border-slate-700 pt-3">
      <label class="text-xs uppercase font-semibold text-slate-400">Visualization</label>

      <div class="flex items-center justify-between">
        <span class="text-sm">Show Sphere</span>
        <button id="toggleSphere" class="w-10 h-5 rounded-full bg-blue-500 relative transition-colors focus:outline-none">
          <div class="w-3 h-3 bg-white rounded-full absolute top-1 left-1 transform translate-x-5 transition-transform"></div>
        </button>
      </div>

      <div class="flex items-center justify-between">
        <span class="text-sm">Auto Rotate</span>
        <button id="toggleRotate" class="w-10 h-5 rounded-full bg-blue-500 relative transition-colors focus:outline-none">
          <div class="w-3 h-3 bg-white rounded-full absolute top-1 left-1 transform translate-x-5 transition-transform"></div>
        </button>
      </div>
    </div>

    <!-- Help -->
    <div class="border-t border-slate-700 pt-3">
      <details class="text-xs text-slate-500">
        <summary class="cursor-pointer text-slate-400 uppercase font-semibold text-[0.6rem] mb-1">Turtle Commands</summary>
        <div class="space-y-0.5 mt-1 font-mono text-[0.6rem] leading-relaxed">

  <div id="main">

            <polygon

            </polygon>

  <div id="right-sidebar">

        class="text-xs text-red-400 hover:text-red-300 uppercase font-bold tracking-wider">Clear All</button>
    </div>
    <div id="savedList" class="flex-1 overflow-y-auto">

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
    import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

    let camera, scene, renderer, controls;
    let lsystemLines, sphereWireframe, sphereMesh;

    // ========================== PRESETS ==========================

    const PRESETS = [
      {
        name: 'Koch Snowflake',
        axiom: 'F--F--F',
        rules: [{ pred: 'F', succ: 'F+F--F+F' }],
        angle: 60, iterations: 3, stepLength: 0.15
      },
      {
        name: 'Dragon Curve',
        axiom: 'FX',
        rules: [{ pred: 'X', succ: 'X+YF+' }, { pred: 'Y', succ: '-FX-Y' }],
        angle: 90, iterations: 8, stepLength: 0.08
      },
      {
        name: 'Sierpinski',
        axiom: 'F-G-G',
        rules: [{ pred: 'F', succ: 'F-G+F+G-F' }, { pred: 'G', succ: 'GG' }],
        angle: 120, iterations: 4, stepLength: 0.08
      },
      {
        name: 'Hilbert',
        axiom: 'X',
        rules: [{ pred: 'X', succ: '-YF+XFX+FY-' }, { pred: 'Y', succ: '+XF-YFY-FX+' }],
        angle: 90, iterations: 4, stepLength: 0.15
      },
      {
        name: 'Plant',
        axiom: 'X',
        rules: [{ pred: 'X', succ: 'F+[[X]-X]-F[-FX]+X' }, { pred: 'F', succ: 'FF' }],
        angle: 25, iterations: 4, stepLength: 0.04
      },
      {
        name: 'Gosper',
        axiom: 'XF',
        rules: [
          { pred: 'X', succ: 'X+YF++YF-FX--FXFX-YF+' },
          { pred: 'Y', succ: '-FX+YFYF++YF+FX--FX-Y' }
        ],
        angle: 60, iterations: 3, stepLength: 0.05
      },
      {
        name: 'Lévy C',
        axiom: 'F',
        rules: [{ pred: 'F', succ: '+F--F+' }],
        angle: 45, iterations: 8, stepLength: 0.04
      },
      {
        name: 'Binary Tree',
        axiom: '0',
        rules: [{ pred: '1', succ: '11' }, { pred: '0', succ: '1[+0]-0' }],
        angle: 45, iterations: 5, stepLength: 0.06
      },
      {
        name: 'Square Koch',
        axiom: 'F+F+F+F',
        rules: [{ pred: 'F', succ: 'F+F-F-FF+F+F-F' }],
        angle: 90, iterations: 2, stepLength: 0.08
      },
      {
        name: 'Penrose',
        axiom: '[X]++[X]++[X]++[X]++[X]',
        rules: [
          { pred: 'W', succ: 'YF++ZF----XF[-YF----WF]++' },
          { pred: 'X', succ: '+YF--ZF[---WF--XF]+' },
          { pred: 'Y', succ: '-WF++XF[+++YF++ZF]-' },
          { pred: 'Z', succ: '--YF++++WF[+ZF++++XF]--XF' },
          { pred: 'F', succ: '' }
        ],
        angle: 36, iterations: 3, stepLength: 0.12
      },
      {
        name: 'Octa Sierpinski',
        axiom: 'XF',
        rules: [{ pred: 'X', succ: 'YF+XF+Y' }, { pred: 'Y', succ: 'XF-YF-X' }],
        angle: 90, iterations: 2, stepLength: 0.196, lineWidth: 3
      },
      {
        name: 'Icosa Cycle',
        axiom: 'F',
        rules: [{ pred: 'F', succ: 'F+F-F-F+F+F-F+F-F-F+F-F+F+F-F-F+F-F' }],
        angle: 108, iterations: 1, stepLength: 0.729, lineWidth: 1
      },
      {
        name: 'Koch Crown',
        axiom: 'F++F++F++F++F++F',
        rules: [{ pred: 'F', succ: 'F-F++F-F' }],
        angle: 60, iterations: 1, stepLength: 0.174, lineWidth: 3
      }
    ];
    // ========================== STATE ==========================

    const state = {
      axiom: 'F--F--F',
      rules: [{ pred: 'F', succ: 'F+F--F+F' }],
      iterations: 3,
      angle: 60,
      stepLength: 0.15,
      lineWidth: 2,
      projection: 'equirectangular',
      showSphere: true,
      autoRotate: true
    };

    const presetThumbnails = {};
    const savedItems = [];

    // ========================== L-SYSTEM ENGINE ==========================

    function lsystemGenerate(axiom, rules, iterations) {
      let current = axiom;
      const ruleMap = {};
      rules.forEach(r => { if (r.pred) ruleMap[r.pred] = r.succ; });

      for (let i = 0; i < iterations; i++) {
        let next = '';
        for (const ch of current) {
          next += (ch in ruleMap) ? ruleMap[ch] : ch;
        }
        current = next;
        // Safety: cap string length to prevent browser freeze
        if (current.length > 500000) {
          console.warn('L-System string capped at 500k characters');
          break;
        }
      }
      return current;
    }

    // ========================== 2D TURTLE ==========================

    function turtleInterpret2D(instructions, angleDeg, stepLen) {
      const angleRad = angleDeg * Math.PI / 180;
      // Returns array of {x1,y1,x2,y2} line segments in 2D
      const segments = [];

      let x = 0, y = 0;
      let heading = Math.PI / 2; // Start heading up (+Y)
      const stack = [];

      const drawChars = new Set(['F', 'G']);
      const moveChars = new Set(['f', 'g']);

      for (const ch of instructions) {
        if (drawChars.has(ch) || ch === '1') {
          const nx = x + Math.cos(heading) * stepLen;
          const ny = y + Math.sin(heading) * stepLen;
          segments.push({ x1: x, y1: y, x2: nx, y2: ny });
          x = nx; y = ny;
        } else if (moveChars.has(ch)) {
          x += Math.cos(heading) * stepLen;
          y += Math.sin(heading) * stepLen;
        } else if (ch === '+') {
          heading += angleRad;
        } else if (ch === '-') {
          heading -= angleRad;
        } else if (ch === '|') {
          heading += Math.PI;
        } else if (ch === '[') {
          stack.push({ x, y, heading });
        } else if (ch === ']') {
          if (stack.length > 0) {
            const s = stack.pop();
            x = s.x; y = s.y; heading = s.heading;
          }
        }
      }
      return segments;
    }

    // ========================== PROJECTIONS ==========================

    // All projections: map (x, y) in 2D → THREE.Vector3 on unit sphere
    // The 2D coordinates are centered at the origin and scaled so the
    // pattern wraps nicely around the sphere.

    function projectEquirectangular(x, y) {
      // x → longitude, y → latitude
      const lon = x;       // radians
      const lat = y;       // radians, clamped to [-π/2, π/2]
      const clampedLat = Math.max(-Math.PI / 2 + 0.001, Math.min(Math.PI / 2 - 0.001, lat));
      return new THREE.Vector3(
        Math.cos(clampedLat) * Math.cos(lon),
        Math.sin(clampedLat),
        Math.cos(clampedLat) * Math.sin(lon)
      ).multiplyScalar(1.003);
    }

    function projectStereographic(x, y) {
      // Inverse stereographic projection from south pole
      // Maps the entire plane to the sphere (excluding south pole)
      const r2 = x * x + y * y;
      const denom = 1 + r2;
      return new THREE.Vector3(
        2 * x / denom,
        (1 - r2) / denom,
        2 * y / denom
      ).multiplyScalar(1.003);
    }

    function projectGnomonic(x, y) {
      // Inverse gnomonic projection (tangent at north pole)
      // Only covers one hemisphere but preserves great circles as straight lines
      const r2 = x * x + y * y;
      const rho = Math.sqrt(r2);
      const c = Math.atan(rho);
      if (rho < 0.0001) return new THREE.Vector3(0, 1, 0).multiplyScalar(1.003);
      return new THREE.Vector3(
        Math.sin(c) * x / rho,
        Math.cos(c),
        Math.sin(c) * y / rho
      ).multiplyScalar(1.003);
    }

    function projectPoint(x, y, projection) {
      switch (projection) {
        case 'stereographic': return projectStereographic(x, y);
        case 'gnomonic': return projectGnomonic(x, y);
        default: return projectEquirectangular(x, y);
      }
    }

    function projectSegments(segs2D, projection) {
      // Convert 2D line segments to 3D via projection, subdividing for smooth curves
      const points3D = [];
      for (const seg of segs2D) {
        const dx = seg.x2 - seg.x1;
        const dy = seg.y2 - seg.y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const subdivs = Math.max(1, Math.ceil(len / 0.05));
        for (let i = 0; i < subdivs; i++) {
          const t1 = i / subdivs;
          const t2 = (i + 1) / subdivs;
          const p1 = projectPoint(seg.x1 + dx * t1, seg.y1 + dy * t1, projection);
          const p2 = projectPoint(seg.x1 + dx * t2, seg.y1 + dy * t2, projection);
          points3D.push(p1, p2);
        }
      }
      return points3D;
    }

    // ========================== THREE.JS SETUP ==========================

    async function init() {
      const canvas = document.getElementById('canvas');
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);

      camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.set(2, 1.5, 2);

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 2.0;

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      const rimLight = new THREE.SpotLight(0x3b82f6, 5);
      rimLight.position.set(-5, 0, -5);
      scene.add(rimLight);

      // Reference Sphere
      const sphereGeo = new THREE.SphereGeometry(1, 32, 24);
      sphereMesh = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({
        color: 0x1e293b,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide,
        flatShading: false,
        shininess: 20
      }));
      scene.add(sphereMesh);

      const wireGeo = new THREE.SphereGeometry(1.001, 24, 16);
      sphereWireframe = new THREE.LineSegments(
        new THREE.WireframeGeometry(wireGeo),
        new THREE.LineBasicMaterial({ color: 0x334155, transparent: true, opacity: 0.15 })
      );
      scene.add(sphereWireframe);

      // Events
      window.addEventListener('resize', onResize);
      document.getElementById('saveBtn').addEventListener('click', saveItem);

      // Toggles
      setupToggle('toggleSphere', 'showSphere');
      setupToggle('toggleRotate', 'autoRotate');

      renderRules();
      generateThumbnails();
      updateToggles();
      onResize();
      update();
      animate();
    }

    function setupToggle(btnId, stateKey) {
      document.getElementById(btnId).parentElement.addEventListener('click', () => {
        state[stateKey] = !state[stateKey];
        updateToggles();
        if (stateKey === 'autoRotate') {
          controls.autoRotate = state.autoRotate;
        } else {
          update();
        }
      });
    }

    window.onProjectionChange = (value) => {
      state.projection = value;
      update();
    };

    function updateToggles() {
      const toggles = [
        { id: 'toggleSphere', key: 'showSphere' },
        { id: 'toggleRotate', key: 'autoRotate' }
      ];

      toggles.forEach(({ id, key }) => {
        const btn = document.getElementById(id);
        const on = state[key];
        btn.className = `w-10 h-5 rounded-full relative transition-colors focus:outline-none ${on ? 'bg-blue-500' : 'bg-slate-700'}`;
        btn.children[0].className = `w-3 h-3 bg-white rounded-full absolute top-1 left-1 transition-transform ${on ? 'translate-x-5' : ''}`;
      });

      // Actually toggle sphere visibility
      if (sphereMesh) sphereMesh.visible = state.showSphere;
      if (sphereWireframe) sphereWireframe.visible = state.showSphere;
      controls.autoRotate = state.autoRotate;
    }

    function onResize() {
      const sidebar = document.getElementById('sidebar');
      const rightSidebar = document.getElementById('right-sidebar');
      const container = document.getElementById('canvas-container');

      const sidebarWidth = sidebar.getBoundingClientRect().width;
      const rightWidth = rightSidebar.getBoundingClientRect().width;
      const w = window.innerWidth - sidebarWidth - rightWidth;
      const h = container.clientHeight;

      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();

      // Update LineMaterial resolution if lines exist
      if (lsystemLines && lsystemLines.material.resolution) {
        lsystemLines.material.resolution.set(w, h);
      }
    }

    // ========================== RULES UI ==========================

    function renderRules() {
      const list = document.getElementById('rulesList');
      list.innerHTML = '';

      state.rules.forEach((rule, i) => {
        const row = document.createElement('div');
        row.className = 'rule-row';
        row.innerHTML = `
          <input type="text" class="rule-input pred" value="${rule.pred}" maxlength="1" spellcheck="false"
            oninput="onRuleChange(${i}, 'pred', this.value)">
          <span class="text-slate-600 text-xs font-bold">→</span>
          <input type="text" class="rule-input succ" value="${rule.succ}" spellcheck="false"
            oninput="onRuleChange(${i}, 'succ', this.value)">
          <button onclick="removeRule(${i})" class="text-slate-500 hover:text-red-400 text-sm flex-shrink-0">&times;</button>
        `;
        list.appendChild(row);
      });
    }

    window.onRuleChange = (index, field, value) => {
      state.rules[index][field] = value;
      update();
    };

    window.removeRule = (index) => {
      state.rules.splice(index, 1);
      renderRules();
      update();
    };

    window.addRule = () => {
      state.rules.push({ pred: '', succ: '' });
      renderRules();
    };

    window.onAxiomChange = (value) => {
      state.axiom = value;
      update();
    };

    window.onParamChange = (key, value) => {
      const val = parseFloat(value);
      state[key] = val;

      // Sync slider and number input
      const syncPairs = {
        iterations: ['iterSlider', 'iterNum'],
        angle: ['angleSlider', 'angleNum'],
        stepLength: ['stepSlider', 'stepNum'],
        lineWidth: ['widthSlider', 'widthNum']
      };

      if (syncPairs[key]) {
        const [sliderId, numId] = syncPairs[key];
        document.getElementById(sliderId).value = val;
        document.getElementById(numId).value = key === 'iterations' ? val : val.toFixed(3);
      }

      if (key === 'lineWidth') {
        // Just re-render lines
        update();
      } else {
        update();
      }
    };



    // ========================== MAIN UPDATE ==========================

    function update() {
      // Generate L-System string
      const lsStr = lsystemGenerate(state.axiom, state.rules, state.iterations);

      // 2D turtle interpretation
      const segs2D = turtleInterpret2D(lsStr, state.angle, state.stepLength);

      // Project onto sphere
      const segments = projectSegments(segs2D, state.projection);

      // Remove old lines
      if (lsystemLines) {
        lsystemLines.geometry.dispose();
        lsystemLines.material.dispose();
        scene.remove(lsystemLines);
        lsystemLines = null;
      }

      if (segments.length >= 2) {
        const positions = new Float32Array(segments.length * 3);
        for (let i = 0; i < segments.length; i++) {
          positions[i * 3] = segments[i].x;
          positions[i * 3 + 1] = segments[i].y;
          positions[i * 3 + 2] = segments[i].z;
        }

        const geo = new LineSegmentsGeometry();
        geo.setPositions(positions);

        const container = document.getElementById('canvas-container');
        const mat = new LineMaterial({
          color: 0xa5b4fc,
          linewidth: state.lineWidth,
          transparent: true,
          opacity: 0.9,
          resolution: new THREE.Vector2(container.clientWidth, container.clientHeight),
          worldUnits: false
        });

        lsystemLines = new LineSegments2(geo, mat);
        scene.add(lsystemLines);
      }

      // Stats
      const segCount = segs2D.length;
      const strLen = lsStr.length;
      document.getElementById('meshStats').innerText =
        `${segCount} segs / ${strLen} chars / ${state.iterations} iter`;
    }

    // ========================== THUMBNAILS ==========================

    function generateThumbnails() {
      const footer = document.getElementById('footer');
      footer.innerHTML = '';

      const width = 256, height = 256;
      const offRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      offRenderer.setSize(width, height);
      offRenderer.setClearColor(0x000000, 0);

      const offScene = new THREE.Scene();
      const offCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
      offCamera.position.set(1.8, 1.4, 1.8);
      offCamera.lookAt(0, 0, 0);

      offScene.add(new THREE.DirectionalLight(0xffffff, 1.5).translateX(2).translateY(5).translateZ(3));
      offScene.add(new THREE.AmbientLight(0xffffff, 0.4));

      // Reference sphere for thumbnails
      const refSphere = new THREE.Mesh(
        new THREE.SphereGeometry(1, 24, 16),
        new THREE.MeshPhongMaterial({ color: 0x1e293b, transparent: true, opacity: 0.25 })
      );

      PRESETS.forEach((preset, idx) => {
        offScene.clear();
        offScene.add(new THREE.DirectionalLight(0xffffff, 1.5));
        offScene.add(new THREE.AmbientLight(0xffffff, 0.4));
        offScene.add(refSphere.clone());

        // Generate a low-iteration version for thumbnail
        const thumbIter = Math.min(preset.iterations, preset.name === 'Dragon Curve' ? 6 : preset.name === 'Lévy C' ? 6 : preset.iterations);
        const str = lsystemGenerate(preset.axiom, preset.rules, thumbIter);
        const segs2D = turtleInterpret2D(str, preset.angle, preset.stepLength || 0.15);
        const segs = projectSegments(segs2D, 'equirectangular');

        if (segs.length >= 2) {
          const geo = new THREE.BufferGeometry().setFromPoints(segs);
          const mat = new THREE.LineBasicMaterial({ color: 0xa5b4fc, transparent: true, opacity: 0.9 });
          offScene.add(new THREE.LineSegments(geo, mat));
        }

        offRenderer.render(offScene, offCamera);

        const dataURL = offRenderer.domElement.toDataURL();
        presetThumbnails[preset.name] = dataURL;

        const btn = document.createElement('div');
        btn.className = `thumb-btn ${idx === 0 ? 'active' : ''}`;
        btn.onclick = () => {
          loadPreset(idx);
          document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };

        const img = document.createElement('img');
        img.src = dataURL;

        const span = document.createElement('span');
        span.textContent = preset.name;

        btn.appendChild(img);
        btn.appendChild(span);
        footer.appendChild(btn);
      });

      offRenderer.dispose();
    }

    function loadPreset(index) {
      const p = PRESETS[index];
      state.axiom = p.axiom;
      state.rules = JSON.parse(JSON.stringify(p.rules));
      state.iterations = p.iterations;
      state.angle = p.angle;
      state.stepLength = p.stepLength || 0.15;
      state.lineWidth = p.lineWidth || 2;
      if (p.projection) {
        state.projection = p.projection;
        document.getElementById('projSelect').value = p.projection;
      }

      // Sync UI
      document.getElementById('axiomInput').value = state.axiom;
      document.getElementById('iterSlider').value = state.iterations;
      document.getElementById('iterNum').value = state.iterations;
      document.getElementById('angleSlider').value = state.angle;
      document.getElementById('angleNum').value = state.angle;
      document.getElementById('stepSlider').value = state.stepLength;
      document.getElementById('stepNum').value = state.stepLength.toFixed(3);
      document.getElementById('widthSlider').value = state.lineWidth;
      document.getElementById('widthNum').value = state.lineWidth.toFixed(1);

      renderRules();
      update();
    }

    // ========================== SAVE / RESTORE ==========================

    function saveItem() {
      renderer.render(scene, camera);
      const dataURL = renderer.domElement.toDataURL('image/png');

      const str = lsystemGenerate(state.axiom, state.rules, state.iterations);
      const segCount = Math.floor(turtleInterpret(str, state.angle, state.stepLength, state.showGeodesics).length / 2);

      const rulesSummary = state.rules.map(r => `${r.pred}→${r.succ}`).join(', ');

      const item = {
        id: Date.now(),
        axiom: state.axiom,
        rules: JSON.parse(JSON.stringify(state.rules)),
        iterations: state.iterations,
        angle: state.angle,
        stepLength: state.stepLength,
        lineWidth: state.lineWidth,
        showSphere: state.showSphere,
        showGeodesics: state.showGeodesics,
        autoRotate: state.autoRotate,
        thumb: dataURL,
        desc: rulesSummary,
        stats: `${segCount} segs / ${state.iterations} iter`
      };

      savedItems.push(item);
      renderSavedList();
    }

    function renderSavedList() {
      const list = document.getElementById('savedList');
      list.innerHTML = '';

      savedItems.forEach((item, index) => {
        const el = document.createElement('div');
        el.className = 'saved-item relative pr-6';
        el.innerHTML = `
          <button class="action-btn del-btn absolute top-2 right-2 flex items-center justify-center w-5 h-5 text-sm" onclick="deleteSaved(${index}); event.stopPropagation();">&times;</button>
          <img src="${item.thumb}" alt="L-System" />
          <div class="flex justify-between items-start mt-1">
            <div class="title">${item.axiom}</div>
            <div class="text-[0.55rem] font-mono text-indigo-400 opacity-60">${item.stats}</div>
          </div>
          <div class="details uppercase opacity-70 truncate">${item.desc}</div>
        `;
        el.onclick = () => restoreSaved(item);
        list.insertBefore(el, list.firstChild);
      });
    }

    function restoreSaved(item) {
      state.axiom = item.axiom;
      state.rules = JSON.parse(JSON.stringify(item.rules));
      state.iterations = item.iterations;
      state.angle = item.angle;
      state.stepLength = item.stepLength;
      state.lineWidth = item.lineWidth;
      state.showSphere = item.showSphere;
      state.showGeodesics = item.showGeodesics;
      state.autoRotate = item.autoRotate;

      // Sync UI
      document.getElementById('axiomInput').value = state.axiom;
      document.getElementById('iterSlider').value = state.iterations;
      document.getElementById('iterNum').value = state.iterations;
      document.getElementById('angleSlider').value = state.angle;
      document.getElementById('angleNum').value = state.angle;
      document.getElementById('stepSlider').value = state.stepLength;
      document.getElementById('stepNum').value = state.stepLength.toFixed(3);
      document.getElementById('widthSlider').value = state.lineWidth;
      document.getElementById('widthNum').value = state.lineWidth.toFixed(1);

      renderRules();
      updateToggles();
      update();
    }

    window.deleteSaved = (index) => {
      savedItems.splice(index, 1);
      renderSavedList();
    };

    window.clearSaved = () => {
      savedItems.length = 0;
      renderSavedList();
    };

    // ========================== ANIMATION ==========================

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    // ========================== BOOT ==========================
    window.onload = init;

  </script>
</body>

</html>
