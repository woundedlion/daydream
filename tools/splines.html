<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spherical Spline Designer</title>
  <!-- Vendored Tailwind (Play CDN build) for offline dev. /vendor/ is
       gitignored, so on the Pages deploy this file 404s; the onerror falls back
       to the Play CDN — the same in-browser build — instead of serving the tool
       unstyled. -->
  <script src="../vendor/tailwindcss.js"
    onerror="this.remove();document.head.appendChild(Object.assign(document.createElement('script'),{src:'https://cdn.tailwindcss.com'}))"></script>
  <script src="../vendor-importmap.js"></script>
  <link rel="stylesheet" href="tools.css">
  <style>
    :root {
      --emerald-400: #34d399;
      --rose-400: #fb7185;
    }

    /* Layout shell (.tool-stage / .tool-panel / .param-group) and its mobile
       collapse live in tools.css. */
    body {
      overflow: hidden;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
      color: white;
    }
    .btn-blue { background: #3b82f6; }
    .btn-blue:hover { background: #2563eb; }
    .btn-emerald { background: #059669; }
    .btn-emerald:hover { background: #047857; }
    .btn-rose { background: #e11d48; }
    .btn-rose:hover { background: #be123c; }

    .mode-toggle {
      display: flex;
      gap: 0.5rem;
    }
    .mode-toggle button {
      flex: 1;
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid var(--slate-700);
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8rem;
    }
    .mode-toggle button.active {
      background: var(--blue-500);
      color: white;
      border-color: var(--blue-500);
    }

  </style>
</head>

<body>
  <div id="canvasContainer" class="tool-stage">
    <canvas id="threeCanvas" class="w-full h-full"></canvas>
  </div>

  <div id="controls" class="tool-panel space-y-4">
    <h1 class="text-2xl font-bold text-white text-center">Spline Designer</h1>
    <p class="text-xs text-gray-400 text-center">Click sphere to place points. Drag to move.</p>

    <div class="param-group">
      <h3 class="text-lg font-semibold text-indigo-400 mb-2">Mode</h3>
      <div class="mode-toggle" id="mode-toggle">
        <button id="mode-bezier" class="active">Bézier (4 pts)</button>
        <button id="mode-catmull">Catmull-Rom (N pts)</button>
      </div>
    </div>

    <div class="param-group">
      <h3 class="text-lg font-semibold text-indigo-400 mb-2">Parameters</h3>
      <div class="flex items-center space-x-3 mt-2">
        <span class="w-20 text-white text-sm font-medium">Tension:</span>
        <input type="range" id="tension-slider" min="0" max="100" value="30" class="flex-grow">
        <span id="tension-value" class="slider-label w-12 text-right">0.30</span>
      </div>
      <div class="flex items-center space-x-3 mt-2">
        <span class="w-20 text-white text-sm font-medium">Samples:</span>
        <input type="range" id="samples-slider" min="4" max="128" value="32" class="flex-grow">
        <span id="samples-value" class="slider-label w-12 text-right">32</span>
      </div>
      <div class="flex items-center mt-3 space-x-3">
        <label class="text-white text-sm font-medium flex items-center space-x-2 cursor-pointer">
          <input type="checkbox" id="closed-toggle" class="h-4 w-4 rounded">
          <span>Closed Loop</span>
        </label>
      </div>
    </div>

    <div class="param-group">
      <h3 class="text-lg font-semibold text-indigo-400 mb-2">Evaluation</h3>
      <div class="mode-toggle" id="eval-toggle">
        <button id="eval-both" class="active">Both</button>
        <button id="eval-fast">Fast Only</button>
        <button id="eval-geo">Geodesic Only</button>
      </div>
      <p class="text-xs text-gray-500 mt-2">
        <span style="color: var(--emerald-400);">■</span> Fast (polynomial)
        <span class="ml-2" style="color: var(--rose-400);">■</span> Geodesic (SLERP)
      </p>
    </div>

    <div class="param-group">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-lg font-semibold text-white">Actions</h3>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button id="btn-clear" class="btn btn-rose">Clear All</button>
        <button id="btn-random" class="btn btn-blue">Random Points</button>
      </div>
    </div>

    <div class="param-group">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-lg font-semibold text-white">Export</h3>
        <button id="btn-copy" class="btn btn-emerald text-xs">Copy</button>
      </div>
      <select id="export-format" class="w-full bg-slate-800 text-sm text-gray-300 p-2 rounded mb-2 border border-slate-600">
        <option value="vectors">constexpr Vector array</option>
        <option value="fragments">Fragment positions</option>
      </select>
      <pre class="bg-slate-900 p-3 rounded-lg border border-slate-700 overflow-x-auto text-xs max-h-40"><code id="export-output" class="font-mono text-slate-300 whitespace-pre">// Place control points to generate code</code></pre>
    </div>

    <p class="text-xs text-gray-500 text-center">Orbit: drag | Place: click sphere | Move: drag point</p>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { initScene, copyWithFeedback, showFatalError } from './shared.js';
    import {
      vec3Normalize,
      generateBezierCurve,
      generateCatmullRomCurve,
      splineExportCode,
      randomPointOnSphere,
    } from './spline_math.js';
    import createHolosphereModule from '../holosphere_wasm.js';

    // The Holosphere WASM engine — the single source of truth for spline math.
    // Loaded once in the bootstrap before any curve is generated.
    let WasmModule = null;

    const SLATE_900 = 0x0f172a;
    const FAST_COLOR = 0x34d399;   // emerald
    const GEO_COLOR = 0xfb7185;    // rose
    const POINT_COLOR = 0xfbbf24;  // amber
    const DRAG_COLOR = 0x60a5fa;   // blue

    // --- State ---
    const state = {
      mode: 'bezier',       // 'bezier' or 'catmull'
      evalMode: 'both',     // 'both', 'fast', 'geo'
      tension: 0.30,
      samples: 32,
      closed: false,
      controlPoints: [],    // [{x,y,z}]
    };

    let scene, camera, renderer, controls;
    let sphereMesh, raycaster, mouse;
    let pointMeshes = [];
    let fastLine = null, geoLine = null;
    let isDragging = false;
    let dragIndex = -1;
    let lastMouseDown = 0;
    let mouseDownX = 0, mouseDownY = 0;
    // Max pointer travel (px) between press and release still treated as a click, not an orbit.
    const CLICK_MOVE_TOLERANCE = 6;

    // --- Spline evaluation ---
    // Evaluated by the Holosphere WASM engine (single source of truth) via the
    // `spline_cubic_fast` / `spline_cubic_slerp` / `spline_catmull_rom_tangents`
    // bindings, so the preview can never drift from the device's spline math.
    // The bridge takes flat floats and returns plain `{x,y,z}` objects.

    function cubicFast(p0, p1, p2, p3, t) {
      return WasmModule.spline_cubic_fast(
        p0.x, p0.y, p0.z, p1.x, p1.y, p1.z,
        p2.x, p2.y, p2.z, p3.x, p3.y, p3.z, t);
    }

    function cubicSlerp(p0, p1, p2, p3, t) {
      return WasmModule.spline_cubic_slerp(
        p0.x, p0.y, p0.z, p1.x, p1.y, p1.z,
        p2.x, p2.y, p2.z, p3.x, p3.y, p3.z, t);
    }

    function catmullRomTangents(prev, start, end, next, tension) {
      return WasmModule.spline_catmull_rom_tangents(
        prev.x, prev.y, prev.z, start.x, start.y, start.z,
        end.x, end.y, end.z, next.x, next.y, next.z, tension);
    }

    // --- Curve generation ---
    // The sampling cores (generateBezierCurve / generateCatmullRomCurve) live in
    // ./spline_math.js; they take the WASM bridge callbacks below so the actual
    // point/tangent math stays in the engine.

    function generateCurve(evalFn) {
      const pts = state.controlPoints;
      if (state.mode === 'bezier') {
        return generateBezierCurve(pts, state.samples, evalFn);
      } else {
        return generateCatmullRomCurve(
          pts, state.tension, state.samples, catmullRomTangents, evalFn, state.closed);
      }
    }

    // --- THREE.js ---

    function createLineMesh(points, color) {
      const verts = points.map(p => new THREE.Vector3(p.x, p.y, p.z));
      const geo = new THREE.BufferGeometry().setFromPoints(verts);
      const mat = new THREE.LineBasicMaterial({
        // linewidth is a no-op in the WebGL renderer (always 1px); omitted.
        color, transparent: true, opacity: 0.9,
        depthWrite: false, depthTest: false
      });
      const line = new THREE.Line(geo, mat);
      line.renderOrder = 1;
      return line;
    }

    // Coalesce updateCurves() into one recompute per animation frame. Dragging
    // a control point fires mousemove on every pointer tick; without this each
    // tick rebuilds both line geometries and re-runs the full WASM spline
    // sampling on the main thread (solids.html solves the same problem with
    // scheduleUpdate). Keeps at most one recompute pending.
    let curvesUpdatePending = 0;
    function scheduleUpdateCurves() {
      if (curvesUpdatePending) return;
      curvesUpdatePending = requestAnimationFrame(() => {
        curvesUpdatePending = 0;
        updateCurves();
      });
    }

    function updateCurves() {
      // Remove old
      if (fastLine) { scene.remove(fastLine); fastLine.geometry.dispose(); fastLine.material.dispose(); fastLine = null; }
      if (geoLine) { scene.remove(geoLine); geoLine.geometry.dispose(); geoLine.material.dispose(); geoLine = null; }

      // The export reflects the control points themselves, not the drawn curve,
      // so refresh it before the minimum-points gate. Otherwise Clear All (and
      // placing the first 1-3 bezier points) would leave stale code on screen.
      updateExport();

      const minPts = state.mode === 'bezier' ? 4 : 2;
      if (state.controlPoints.length < minPts) return;

      if (state.evalMode === 'both' || state.evalMode === 'fast') {
        const pts = generateCurve(cubicFast);
        if (pts.length > 1) {
          fastLine = createLineMesh(pts, FAST_COLOR);
          scene.add(fastLine);
        }
      }
      if (state.evalMode === 'both' || state.evalMode === 'geo') {
        const pts = generateCurve(cubicSlerp);
        if (pts.length > 1) {
          geoLine = createLineMesh(pts, GEO_COLOR);
          scene.add(geoLine);
        }
      }
    }

    function updatePointMeshes() {
      // Remove old point meshes
      pointMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
      pointMeshes = [];

      state.controlPoints.forEach((p, idx) => {
        const geo = new THREE.SphereGeometry(0.04, 16, 8);
        const mat = new THREE.MeshBasicMaterial({
          color: (dragIndex === idx) ? DRAG_COLOR : POINT_COLOR,
          depthTest: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(p.x, p.y, p.z);
        mesh.renderOrder = 2;
        mesh.userData.pointIndex = idx;
        scene.add(mesh);
        pointMeshes.push(mesh);
      });
    }

    function updateExport() {
      const output = document.getElementById('export-output');
      const format = document.getElementById('export-format').value;
      // The pure snippet builder (incl. the C++ float formatter) lives in
      // ./spline_math.js; the DOM read/write stays here.
      output.textContent = splineExportCode(state.controlPoints, format);
    }

    // --- Input handling ---

    function onMouseDown(e) {
      if (e.button !== 0) return;
      lastMouseDown = Date.now();
      mouseDownX = e.clientX;
      mouseDownY = e.clientY;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      // Check for point hit first
      const pointHits = raycaster.intersectObjects(pointMeshes);
      if (pointHits.length > 0) {
        isDragging = true;
        dragIndex = pointHits[0].object.userData.pointIndex;
        controls.enabled = false;
        updatePointMeshes();
        return;
      }
    }

    function onMouseUp(e) {
      if (e.button !== 0) return;
      const elapsed = Date.now() - lastMouseDown;

      if (isDragging) {
        isDragging = false;
        dragIndex = -1;
        controls.enabled = true;
        updatePointMeshes();
        return;
      }

      // Only place a point on a quick, stationary click — a fast orbit flick can
      // pass the time check, so also require the pointer to have barely moved.
      if (elapsed > 300) return;
      const moved = Math.hypot(e.clientX - mouseDownX, e.clientY - mouseDownY);
      if (moved > CLICK_MOVE_TOLERANCE) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const hits = raycaster.intersectObject(sphereMesh);
      if (hits.length > 0) {
        const pt = hits[0].point;
        const norm = vec3Normalize({ x: pt.x, y: pt.y, z: pt.z });

        // In bezier mode, max 4 points
        if (state.mode === 'bezier' && state.controlPoints.length >= 4) return;

        state.controlPoints.push(norm);
        updatePointMeshes();
        updateCurves();
      }
    }

    function onMouseMove(e) {
      if (!isDragging || dragIndex < 0) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const hits = raycaster.intersectObject(sphereMesh);
      if (hits.length > 0) {
        const pt = hits[0].point;
        const norm = vec3Normalize({ x: pt.x, y: pt.y, z: pt.z });
        state.controlPoints[dragIndex] = norm;
        // Move the dragged dot immediately for responsiveness, but coalesce the
        // expensive curve rebuild (geometry + WASM sampling) to one per frame.
        pointMeshes[dragIndex].position.set(norm.x, norm.y, norm.z);
        scheduleUpdateCurves();
      }
    }

    function initThree() {
      const result = initScene('canvasContainer', 'threeCanvas', {
        background: SLATE_900,
        cameraDistance: 3,
      });
      scene = result.scene;
      camera = result.camera;
      renderer = result.renderer;
      controls = result.controls;
      sphereMesh = result.sphere;

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      // Input
      renderer.domElement.addEventListener('mousedown', onMouseDown);
      renderer.domElement.addEventListener('mouseup', onMouseUp);
      renderer.domElement.addEventListener('mousemove', onMouseMove);

      // Wire the scaffold's dispose() to teardown — it stops the render loop and
      // detaches the resize listener, which previously leaked on page unload.
      window.addEventListener('pagehide', () => result.dispose(), { once: true });
    }

    // --- UI wiring ---

    function initUI() {
      // Mode toggle
      document.getElementById('mode-bezier').addEventListener('click', () => {
        state.mode = 'bezier';
        document.getElementById('mode-bezier').classList.add('active');
        document.getElementById('mode-catmull').classList.remove('active');
        updateCurves();
      });
      document.getElementById('mode-catmull').addEventListener('click', () => {
        state.mode = 'catmull';
        document.getElementById('mode-catmull').classList.add('active');
        document.getElementById('mode-bezier').classList.remove('active');
        updateCurves();
      });

      // Eval toggle
      ['both', 'fast', 'geo'].forEach(id => {
        document.getElementById(`eval-${id}`).addEventListener('click', () => {
          state.evalMode = id;
          ['both', 'fast', 'geo'].forEach(eid => {
            document.getElementById(`eval-${eid}`).classList.toggle('active', eid === id);
          });
          updateCurves();
        });
      });

      // Sliders
      const tensionSlider = document.getElementById('tension-slider');
      const tensionValue = document.getElementById('tension-value');
      tensionSlider.addEventListener('input', () => {
        state.tension = parseFloat(tensionSlider.value) / 100;
        tensionValue.textContent = state.tension.toFixed(2);
        updateCurves();
      });

      const samplesSlider = document.getElementById('samples-slider');
      const samplesValue = document.getElementById('samples-value');
      samplesSlider.addEventListener('input', () => {
        state.samples = parseInt(samplesSlider.value);
        samplesValue.textContent = state.samples;
        updateCurves();
      });

      // Closed
      document.getElementById('closed-toggle').addEventListener('change', (e) => {
        state.closed = e.target.checked;
        updateCurves();
      });

      // Clear
      document.getElementById('btn-clear').addEventListener('click', () => {
        state.controlPoints = [];
        updatePointMeshes();
        updateCurves();
      });

      // Random
      document.getElementById('btn-random').addEventListener('click', () => {
        const n = state.mode === 'bezier' ? 4 : 6;
        state.controlPoints = [];
        for (let i = 0; i < n; i++) {
          state.controlPoints.push(randomPointOnSphere());
        }
        updatePointMeshes();
        updateCurves();
      });

      // Copy
      document.getElementById('btn-copy').addEventListener('click', () => {
        const text = document.getElementById('export-output').textContent;
        copyWithFeedback(text,
          { element: document.getElementById('btn-copy'), revertText: 'Copy' });
      });

      // Export format change
      document.getElementById('export-format').addEventListener('change', updateExport);
    }

    // --- Bootstrap ---
    // addEventListener (not window.onload =) avoids clobbering any other load
    // handler. The inner try/catch surfaces a synchronous initUI/initThree
    // failure (a bare window.onload assignment would swallow it) distinctly from
    // the WASM-load failure handled above.
    window.addEventListener('load', async () => {
      try {
        WasmModule = await createHolosphereModule();
      } catch (e) {
        console.error('Failed to load the Holosphere WASM module:', e);
        showFatalError('Failed to load the Holosphere WASM engine — the spline '
          + 'tool needs the built holosphere_wasm artifacts. Build the WASM '
          + 'target and reload.');
        return;
      }
      try {
        initUI();
        initThree();
      } catch (e) {
        console.error('Spline tool failed to initialize:', e);
        showFatalError('The spline tool failed to initialize — see the browser console for details.');
      }
    });
  </script>
</body>

</html>
