<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spherical Spline Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js"
      }
    }
  </script>
  <style>
    :root {
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --blue-500: #3b82f6;
      --indigo-400: #818cf8;
      --emerald-400: #34d399;
      --rose-400: #fb7185;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--slate-900);
      color: #E2E8F0;
      overflow: hidden;
    }

    #canvasContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: calc(100vw - 420px);
      height: 100vh;
      z-index: 10;
    }

    #controls {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      z-index: 20;
      width: 420px;
      max-width: 100vw;
      padding: 1.5rem;
      background-color: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow-y: auto;
      box-shadow: -4px 0 10px rgba(0, 0, 0, 0.4);
      border-left: 1px solid var(--slate-700);
    }

    .param-group {
      background-color: var(--slate-700);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    input[type=range] {
      height: 6px;
      -webkit-appearance: none;
      width: 100%;
      background: #475569;
      border-radius: 3px;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: var(--blue-500);
      cursor: pointer;
      margin-top: 3px;
    }

    .slider-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      color: var(--indigo-400);
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
      color: white;
    }
    .btn-blue { background: #3b82f6; }
    .btn-blue:hover { background: #2563eb; }
    .btn-emerald { background: #059669; }
    .btn-emerald:hover { background: #047857; }
    .btn-rose { background: #e11d48; }
    .btn-rose:hover { background: #be123c; }

    .mode-toggle {
      display: flex;
      gap: 0.5rem;
    }
    .mode-toggle button {
      flex: 1;
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid var(--slate-700);
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8rem;
    }
    .mode-toggle button.active {
      background: var(--blue-500);
      color: white;
      border-color: var(--blue-500);
    }

    @media (max-width: 640px) {
      #controls {
        width: 100vw;
        height: 50vh;
        top: auto;
        bottom: 0;
        border-top: 1px solid var(--slate-700);
        border-left: none;
      }
      #canvasContainer {
        height: 50vh;
        width: 100vw;
      }
    }
  </style>
</head>

<body>
  <div id="canvasContainer">
    <canvas id="threeCanvas" class="w-full h-full"></canvas>
  </div>

  <div id="controls" class="space-y-4">
    <h1 class="text-2xl font-bold text-white text-center">Spline Designer</h1>
    <p class="text-xs text-gray-400 text-center">Click sphere to place points. Drag to move.</p>

    <div class="param-group">
      <h3 class="text-lg font-semibold text-indigo-400 mb-2">Mode</h3>
      <div class="mode-toggle" id="mode-toggle">
        <button id="mode-bezier" class="active">Bézier (4 pts)</button>
        <button id="mode-catmull">Catmull-Rom (N pts)</button>
      </div>
    </div>

    <div class="param-group">
      <h3 class="text-lg font-semibold text-indigo-400 mb-2">Parameters</h3>
      <div class="flex items-center space-x-3 mt-2">
        <span class="w-20 text-white text-sm font-medium">Tension:</span>
        <input type="range" id="tension-slider" min="0" max="100" value="30" class="flex-grow">
        <span id="tension-value" class="slider-label w-12 text-right">0.30</span>
      </div>
      <div class="flex items-center space-x-3 mt-2">
        <span class="w-20 text-white text-sm font-medium">Samples:</span>
        <input type="range" id="samples-slider" min="4" max="128" value="32" class="flex-grow">
        <span id="samples-value" class="slider-label w-12 text-right">32</span>
      </div>
      <div class="flex items-center mt-3 space-x-3">
        <label class="text-white text-sm font-medium flex items-center space-x-2 cursor-pointer">
          <input type="checkbox" id="closed-toggle" class="h-4 w-4 rounded">
          <span>Closed Loop</span>
        </label>
      </div>
    </div>

    <div class="param-group">
      <h3 class="text-lg font-semibold text-indigo-400 mb-2">Evaluation</h3>
      <div class="mode-toggle" id="eval-toggle">
        <button id="eval-both" class="active">Both</button>
        <button id="eval-fast">Fast Only</button>
        <button id="eval-geo">Geodesic Only</button>
      </div>
      <p class="text-xs text-gray-500 mt-2">
        <span style="color: var(--emerald-400);">■</span> Fast (polynomial)
        <span class="ml-2" style="color: var(--rose-400);">■</span> Geodesic (SLERP)
      </p>
    </div>

    <div class="param-group">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-lg font-semibold text-white">Actions</h3>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button id="btn-clear" class="btn btn-rose">Clear All</button>
        <button id="btn-random" class="btn btn-blue">Random Points</button>
      </div>
    </div>

    <div class="param-group">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-lg font-semibold text-white">Export</h3>
        <button id="btn-copy" class="btn btn-emerald text-xs">Copy</button>
      </div>
      <select id="export-format" class="w-full bg-slate-800 text-sm text-gray-300 p-2 rounded mb-2 border border-slate-600">
        <option value="vectors">constexpr Vector array</option>
        <option value="fragments">Fragment positions</option>
      </select>
      <pre class="bg-slate-900 p-3 rounded-lg border border-slate-700 overflow-x-auto text-xs max-h-40"><code id="export-output" class="font-mono text-slate-300 whitespace-pre">// Place control points to generate code</code></pre>
    </div>

    <p class="text-xs text-gray-500 text-center">Orbit: drag | Place: click sphere | Move: drag point</p>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const SLATE_900 = 0x0f172a;
    const FAST_COLOR = 0x34d399;   // emerald
    const GEO_COLOR = 0xfb7185;    // rose
    const POINT_COLOR = 0xfbbf24;  // amber
    const DRAG_COLOR = 0x60a5fa;   // blue

    // --- State ---
    const state = {
      mode: 'bezier',       // 'bezier' or 'catmull'
      evalMode: 'both',     // 'both', 'fast', 'geo'
      tension: 0.30,
      samples: 32,
      closed: false,
      controlPoints: [],    // [{x,y,z}]
    };

    let scene, camera, renderer, controls;
    let sphereMesh, raycaster, mouse;
    let pointMeshes = [];
    let fastLine = null, geoLine = null;
    let isDragging = false;
    let dragIndex = -1;
    let lastMouseDown = 0;

    // --- Spline evaluation (pure JS, matching C++ Spline:: namespace) ---

    function vec3Normalize(v) {
      const len = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
      if (len < 1e-10) return { x: 1, y: 0, z: 0 };
      return { x: v.x/len, y: v.y/len, z: v.z/len };
    }

    function vec3Dot(a, b) { return a.x*b.x + a.y*b.y + a.z*b.z; }

    function vec3Add(a, b) { return { x: a.x+b.x, y: a.y+b.y, z: a.z+b.z }; }
    function vec3Sub(a, b) { return { x: a.x-b.x, y: a.y-b.y, z: a.z-b.z }; }
    function vec3Scale(v, s) { return { x: v.x*s, y: v.y*s, z: v.z*s }; }

    function slerpVec(v1, v2, t) {
      let d = Math.max(-1, Math.min(1, vec3Dot(v1, v2)));
      if (d > 0.9999) {
        return vec3Normalize(vec3Add(v1, vec3Scale(vec3Sub(v2, v1), t)));
      }
      const theta = Math.acos(d);
      const sinTheta = Math.sin(theta);
      if (sinTheta < 0.0001) {
        return vec3Normalize(vec3Add(v1, vec3Scale(vec3Sub(v2, v1), t)));
      }
      const s1 = Math.sin((1-t)*theta) / sinTheta;
      const s2 = Math.sin(t*theta) / sinTheta;
      return vec3Normalize(vec3Add(vec3Scale(v1, s1), vec3Scale(v2, s2)));
    }

    function cubicFast(p0, p1, p2, p3, t) {
      const u = 1 - t;
      const uu = u*u, tt = t*t;
      return vec3Normalize(vec3Add(
        vec3Add(vec3Scale(p0, uu*u), vec3Scale(p1, 3*uu*t)),
        vec3Add(vec3Scale(p2, 3*u*tt), vec3Scale(p3, tt*t))
      ));
    }

    function cubicSlerp(p0, p1, p2, p3, t) {
      const b01 = slerpVec(p0, p1, t);
      const b12 = slerpVec(p1, p2, t);
      const b23 = slerpVec(p2, p3, t);
      const b012 = slerpVec(b01, b12, t);
      const b123 = slerpVec(b12, b23, t);
      return slerpVec(b012, b123, t);
    }

    function catmullRomTangents(prev, start, end, next, tension) {
      const cp1 = slerpVec(start, slerpVec(prev, end, 0.5), tension);
      const cp2 = slerpVec(end, slerpVec(start, next, 0.5), tension);
      return { cp1, cp2 };
    }

    // --- Curve generation ---

    function generateBezierCurve(pts, numSamples, evalFn) {
      if (pts.length < 4) return [];
      const result = [];
      for (let i = 0; i <= numSamples; i++) {
        const t = i / numSamples;
        result.push(evalFn(pts[0], pts[1], pts[2], pts[3], t));
      }
      return result;
    }

    function generateCatmullRomCurve(pts, tension, numSamplesPerSeg, evalFn, closed) {
      const n = pts.length;
      if (n < 2) return [];
      const result = [];
      const segCount = closed ? n : n - 1;

      for (let i = 0; i < segCount; i++) {
        const i0 = (i === 0 && !closed) ? 0 : ((i - 1 + n) % n);
        const i1 = i;
        const i2 = (i + 1) % n;
        const i3 = (i + 2 >= n && !closed) ? n - 1 : ((i + 2) % n);

        const { cp1, cp2 } = catmullRomTangents(pts[i0], pts[i1], pts[i2], pts[i3], tension);

        const startJ = (i === 0) ? 0 : 1;
        for (let j = startJ; j <= numSamplesPerSeg; j++) {
          const t = j / numSamplesPerSeg;
          result.push(evalFn(pts[i1], cp1, cp2, pts[i2], t));
        }
      }
      return result;
    }

    function generateCurve(evalFn) {
      const pts = state.controlPoints;
      if (state.mode === 'bezier') {
        return generateBezierCurve(pts, state.samples, evalFn);
      } else {
        return generateCatmullRomCurve(pts, state.tension, state.samples, evalFn, state.closed);
      }
    }

    // --- THREE.js ---

    function createLineMesh(points, color) {
      const verts = points.map(p => new THREE.Vector3(p.x, p.y, p.z));
      const geo = new THREE.BufferGeometry().setFromPoints(verts);
      const mat = new THREE.LineBasicMaterial({
        color, linewidth: 2, transparent: true, opacity: 0.9,
        depthWrite: false, depthTest: false
      });
      const line = new THREE.Line(geo, mat);
      line.renderOrder = 1;
      return line;
    }

    function updateCurves() {
      // Remove old
      if (fastLine) { scene.remove(fastLine); fastLine.geometry.dispose(); fastLine.material.dispose(); fastLine = null; }
      if (geoLine) { scene.remove(geoLine); geoLine.geometry.dispose(); geoLine.material.dispose(); geoLine = null; }

      const minPts = state.mode === 'bezier' ? 4 : 2;
      if (state.controlPoints.length < minPts) return;

      if (state.evalMode === 'both' || state.evalMode === 'fast') {
        const pts = generateCurve(cubicFast);
        if (pts.length > 1) {
          fastLine = createLineMesh(pts, FAST_COLOR);
          scene.add(fastLine);
        }
      }
      if (state.evalMode === 'both' || state.evalMode === 'geo') {
        const pts = generateCurve(cubicSlerp);
        if (pts.length > 1) {
          geoLine = createLineMesh(pts, GEO_COLOR);
          scene.add(geoLine);
        }
      }

      updateExport();
    }

    function updatePointMeshes() {
      // Remove old point meshes
      pointMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
      pointMeshes = [];

      state.controlPoints.forEach((p, idx) => {
        const geo = new THREE.SphereGeometry(0.04, 16, 8);
        const mat = new THREE.MeshBasicMaterial({
          color: (dragIndex === idx) ? DRAG_COLOR : POINT_COLOR,
          depthTest: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(p.x, p.y, p.z);
        mesh.renderOrder = 2;
        mesh.userData.pointIndex = idx;
        scene.add(mesh);
        pointMeshes.push(mesh);
      });
    }

    function updateExport() {
      const output = document.getElementById('export-output');
      const format = document.getElementById('export-format').value;
      const pts = state.controlPoints;

      if (pts.length === 0) {
        output.textContent = '// Place control points to generate code';
        return;
      }

      const f = (n) => {
        const s = n.toFixed(6);
        return s.replace(/\.?0+$/, '') + 'f';
      };

      if (format === 'vectors') {
        let code = `constexpr std::array<Vector, ${pts.length}> control_points = {{\n`;
        pts.forEach((p, i) => {
          code += `    Vector(${f(p.x)}, ${f(p.y)}, ${f(p.z)})`;
          code += (i < pts.length - 1) ? ',\n' : '\n';
        });
        code += '}};';
        output.textContent = code;
      } else {
        let code = `// ${pts.length} control point fragments\n`;
        pts.forEach((p, i) => {
          code += `Fragment f${i};\n`;
          code += `f${i}.pos = Vector(${f(p.x)}, ${f(p.y)}, ${f(p.z)});\n`;
        });
        output.textContent = code;
      }
    }

    // --- Input handling ---

    function onMouseDown(e) {
      if (e.button !== 0) return;
      lastMouseDown = Date.now();

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      // Check for point hit first
      const pointHits = raycaster.intersectObjects(pointMeshes);
      if (pointHits.length > 0) {
        isDragging = true;
        dragIndex = pointHits[0].object.userData.pointIndex;
        controls.enabled = false;
        updatePointMeshes();
        return;
      }
    }

    function onMouseUp(e) {
      if (e.button !== 0) return;
      const elapsed = Date.now() - lastMouseDown;

      if (isDragging) {
        isDragging = false;
        dragIndex = -1;
        controls.enabled = true;
        updatePointMeshes();
        return;
      }

      // Only place point on quick click (< 300ms)
      if (elapsed > 300) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const hits = raycaster.intersectObject(sphereMesh);
      if (hits.length > 0) {
        const pt = hits[0].point;
        const norm = vec3Normalize({ x: pt.x, y: pt.y, z: pt.z });

        // In bezier mode, max 4 points
        if (state.mode === 'bezier' && state.controlPoints.length >= 4) return;

        state.controlPoints.push(norm);
        updatePointMeshes();
        updateCurves();
      }
    }

    function onMouseMove(e) {
      if (!isDragging || dragIndex < 0) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const hits = raycaster.intersectObject(sphereMesh);
      if (hits.length > 0) {
        const pt = hits[0].point;
        const norm = vec3Normalize({ x: pt.x, y: pt.y, z: pt.z });
        state.controlPoints[dragIndex] = norm;
        pointMeshes[dragIndex].position.set(norm.x, norm.y, norm.z);
        updateCurves();
      }
    }

    // --- Init ---

    function initThree() {
      const container = document.getElementById('canvasContainer');
      const w = container.clientWidth;
      const h = container.clientHeight;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(SLATE_900);

      camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
      camera.position.set(1.5, 1.5, 3);

      renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('threeCanvas'),
        antialias: true
      });
      renderer.setSize(w, h);
      renderer.setPixelRatio(window.devicePixelRatio);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.minDistance = 2;
      controls.maxDistance = 10;
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      // Sphere
      const geo = new THREE.SphereGeometry(1.0, 64, 32);
      const mat = new THREE.MeshBasicMaterial({
        color: 0x334155, wireframe: true, transparent: true, opacity: 0.2
      });
      sphereMesh = new THREE.Mesh(geo, mat);
      sphereMesh.renderOrder = 0;
      scene.add(sphereMesh);

      // Input
      renderer.domElement.addEventListener('mousedown', onMouseDown);
      renderer.domElement.addEventListener('mouseup', onMouseUp);
      renderer.domElement.addEventListener('mousemove', onMouseMove);

      const animate = () => {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      };
      animate();
    }

    function onResize() {
      if (!renderer) return;
      const container = document.getElementById('canvasContainer');
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    }

    // --- UI wiring ---

    function initUI() {
      // Mode toggle
      document.getElementById('mode-bezier').addEventListener('click', () => {
        state.mode = 'bezier';
        document.getElementById('mode-bezier').classList.add('active');
        document.getElementById('mode-catmull').classList.remove('active');
        updateCurves();
      });
      document.getElementById('mode-catmull').addEventListener('click', () => {
        state.mode = 'catmull';
        document.getElementById('mode-catmull').classList.add('active');
        document.getElementById('mode-bezier').classList.remove('active');
        updateCurves();
      });

      // Eval toggle
      ['both', 'fast', 'geo'].forEach(id => {
        document.getElementById(`eval-${id}`).addEventListener('click', () => {
          state.evalMode = id;
          ['both', 'fast', 'geo'].forEach(eid => {
            document.getElementById(`eval-${eid}`).classList.toggle('active', eid === id);
          });
          updateCurves();
        });
      });

      // Sliders
      const tensionSlider = document.getElementById('tension-slider');
      const tensionValue = document.getElementById('tension-value');
      tensionSlider.addEventListener('input', () => {
        state.tension = parseFloat(tensionSlider.value) / 100;
        tensionValue.textContent = state.tension.toFixed(2);
        updateCurves();
      });

      const samplesSlider = document.getElementById('samples-slider');
      const samplesValue = document.getElementById('samples-value');
      samplesSlider.addEventListener('input', () => {
        state.samples = parseInt(samplesSlider.value);
        samplesValue.textContent = state.samples;
        updateCurves();
      });

      // Closed
      document.getElementById('closed-toggle').addEventListener('change', (e) => {
        state.closed = e.target.checked;
        updateCurves();
      });

      // Clear
      document.getElementById('btn-clear').addEventListener('click', () => {
        state.controlPoints = [];
        updatePointMeshes();
        updateCurves();
      });

      // Random
      document.getElementById('btn-random').addEventListener('click', () => {
        const n = state.mode === 'bezier' ? 4 : 6;
        state.controlPoints = [];
        for (let i = 0; i < n; i++) {
          // Marsaglia's method for uniform sphere sampling
          let v1, v2, s;
          do {
            v1 = 2 * Math.random() - 1;
            v2 = 2 * Math.random() - 1;
            s = v1*v1 + v2*v2;
          } while (s >= 1 || s === 0);
          const sq = Math.sqrt(1 - s);
          state.controlPoints.push(vec3Normalize({
            x: 2 * v1 * sq,
            y: 2 * v2 * sq,
            z: 1 - 2 * s
          }));
        }
        updatePointMeshes();
        updateCurves();
      });

      // Copy
      document.getElementById('btn-copy').addEventListener('click', () => {
        const text = document.getElementById('export-output').textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('btn-copy');
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
        });
      });

      // Export format change
      document.getElementById('export-format').addEventListener('change', updateExport);
    }

    // --- Bootstrap ---
    window.addEventListener('resize', onResize);
    window.onload = () => {
      initUI();
      initThree();
    };
  </script>
</body>

</html>
